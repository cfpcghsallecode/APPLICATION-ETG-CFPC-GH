<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Suivi ETG &mdash; Georges Hoareau</title>
<link rel="icon" href="/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1B3A6B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Suivi ETG">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--b:#1B3A6B;--c:#6CB4E8;--bg:#F7F8FA;--sf:#fff;--bd:#E5E5E5;--ok:#2A9D5C;--okb:#E8F7EF;--ko:#D64545;--kob:#FCEBEB;--wa:#E8A33D;--wab:#FCF3E3;--mu:#888;--r:10px;--f:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
body{font-family:var(--f);background:var(--bg);color:#1a1a1a;font-size:14px;min-height:100vh}
.H{display:none!important}
.aw{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem 1.25rem}
.al{max-width:220px;margin-bottom:1.5rem}
.ac{width:100%;max-width:360px;background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:1.5rem}
.ac h2{font-size:18px;font-weight:700;color:var(--b);margin-bottom:1.25rem}
.lr{display:flex;gap:10px;justify-content:center;margin-top:1.5rem}
.lr img{height:42px;object-fit:contain}
.fi{margin-bottom:13px}
.fi label{display:block;font-size:12px;color:#555;margin-bottom:5px;font-weight:500}
.fi input,.fi select{width:100%;padding:11px 12px;border-radius:var(--r);border:1px solid var(--bd);font-size:14px;font-family:var(--f);background:var(--sf);color:#1a1a1a;-webkit-appearance:none}
.fi input:focus,.fi select:focus{outline:none;border-color:var(--c);box-shadow:0 0 0 3px rgba(108,180,232,.2)}
.btn{width:100%;padding:12px;border-radius:var(--r);border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--f)}
.bp{background:var(--b);color:#fff}
.ba{background:var(--c);color:var(--b)}
.bg{background:none;border:1px solid var(--bd);color:#555}
.bs{width:auto;padding:7px 14px;font-size:12px;font-weight:500}
.lk{background:none;border:none;color:var(--b);font-size:13px;cursor:pointer;text-decoration:underline;font-family:var(--f);padding:6px 0;display:block;text-align:center;margin-top:10px}
.em{color:var(--ko);font-size:12px;margin-top:8px}
.as{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}
.as.wd{max-width:760px}
.hd{background:var(--b);color:#fff;padding:.9rem 1.25rem;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:20}
.hd img{height:26px}
.hi2{flex:1}
.ht{font-size:14px;font-weight:600}
.hs{font-size:11px;opacity:.75;margin-top:1px}
.hb{background:none;border:none;color:#fff;cursor:pointer;padding:6px;font-size:18px}
.ct{flex:1;padding:1.25rem;padding-bottom:5.5rem}
.tb{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:var(--sf);border-top:1px solid var(--bd);display:flex;z-index:20}
.tb.wd{max-width:760px}
.ti{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0 6px;color:var(--mu);font-size:10px;font-family:var(--f);cursor:pointer}
.ti.ac2{color:var(--b);font-weight:600}
.ti span{font-size:20px}
.cd{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:1rem 1.1rem;margin-bottom:.75rem}
.cdt{font-size:14px;font-weight:600;color:var(--b);margin-bottom:.75rem}
.bk{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600}
.bok{background:var(--okb);color:var(--ok)}
.bko{background:var(--kob);color:var(--ko)}
.bwa{background:var(--wab);color:var(--wa)}
.bct{background:#E6F1FB;color:#185FA5}
.sg{display:grid;gap:10px;margin-bottom:1rem}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:repeat(3,1fr)}
.sc2{background:var(--bg);border-radius:var(--r);padding:11px;text-align:center}
.sv{font-size:22px;font-weight:700;color:var(--b)}
.sl{font-size:11px;color:var(--mu);margin-top:2px}
.pb{height:6px;border-radius:3px;background:var(--bd);overflow:hidden;margin-top:5px}
.pf{height:100%;border-radius:3px;background:var(--c);transition:width .3s}
/* PHASE 1 */
.qr2{padding:10px 0;border-bottom:1px solid var(--bd)}
.qr2:last-child{border-bottom:none}
.qnum{font-size:12px;font-weight:700;color:var(--b);margin-bottom:6px}
.rep-btns{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.rb2{width:42px;height:42px;border-radius:8px;border:1.5px solid var(--bd);background:var(--sf);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--f);color:#555;transition:all .15s}
.rb2.sel{border-color:var(--b);background:var(--b);color:#fff}
.cert-btns{display:flex;gap:6px}
.cb{flex:1;padding:8px 4px;border-radius:8px;border:1.5px solid var(--bd);background:var(--sf);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--f);transition:all .15s;color:#555}
.cb.sure{border-color:var(--ok);background:var(--okb);color:var(--ok)}
.cb.doubt{border-color:var(--wa);background:var(--wab);color:var(--wa)}
.cb.guess{border-color:var(--ko);background:var(--kob);color:var(--ko)}
.sure-err{background:var(--kob);color:var(--ko);border:1px solid var(--ko);border-radius:6px;padding:5px 8px;font-size:11px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
/* PHASE 2 - CORRECTION */
.qr3{padding:10px 0;border-bottom:1px solid var(--bd)}
.qr3:last-child{border-bottom:none}
.q3head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.rep-grid{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.rc2{width:42px;height:42px;border-radius:8px;border:1.5px solid var(--bd);background:var(--sf);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--f);position:relative;display:flex;align-items:center;justify-content:center;transition:all .15s}
.rc2.corr-ok{border-color:var(--ok);background:var(--okb);color:var(--ok)}
.rc2.corr-ko{border-color:var(--ko);background:var(--kob);color:var(--ko);text-decoration:line-through}
.rc2.corr-miss{border-color:var(--wa);background:var(--wab);color:var(--wa)}
.rc2.bon-sel{border-color:var(--ok);background:var(--ok);color:#fff}
.cert-badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600}
.cb-sure{background:var(--okb);color:var(--ok)}
.cb-doubt{background:var(--wab);color:var(--wa)}
.cb-guess{background:var(--kob);color:var(--ko)}
.bon-row{font-size:11px;color:var(--mu);margin-bottom:4px}
.bon-btns{display:flex;gap:5px;flex-wrap:wrap}
.bb{width:38px;height:38px;border-radius:7px;border:1.5px solid var(--bd);background:var(--sf);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--f);color:#555;transition:all .15s}
.bb.sel{border-color:var(--ok);background:var(--ok);color:#fff}
.es{display:flex;gap:4px;margin-top:6px}
.es button{flex:1;padding:6px 2px;font-size:11px;background:var(--sf);border:1px solid var(--bd);border-radius:6px;cursor:pointer;font-family:var(--f)}
.es button.s1{background:var(--kob);border-color:var(--ko);color:var(--ko)}
.es button.s2{background:var(--wab);border-color:var(--wa);color:var(--wa)}
.es button.s3{background:#E6F1FB;border-color:#378ADD;color:#185FA5}
.fb{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.fb select,.fb input{flex:1;min-width:110px;padding:8px 10px;border-radius:var(--r);border:1px solid var(--bd);font-size:13px;font-family:var(--f)}
.hl{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--bd);cursor:pointer}
.hl:last-child{border-bottom:none}
.hli{flex:1}
.hld{font-size:13px;font-weight:600}
.hlm{font-size:11px;color:var(--mu);margin-top:2px}
.bli{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--kob);border-radius:6px;margin-bottom:4px;font-size:12px}
.cw{position:relative;height:180px;margin-top:10px}
.empty{text-align:center;color:var(--mu);padding:2.5rem 1rem;font-size:13px}
.ph{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;background:#E6F1FB;color:#185FA5;margin-bottom:12px}
.rw{display:flex;gap:8px;align-items:center}
.mt{margin-top:12px}
.pt{font-size:16px;font-weight:700;color:var(--b);margin-bottom:1rem}
/* NOUVEAU : badges d'estimation vs réalité, recommandations, pastille formateur, bandeau hors-ligne */
.est-badge{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:10px;font-size:12px}
.est-badge.eb-ok{background:var(--okb);color:var(--ok)}
.est-badge.eb-wa{background:var(--wab);color:var(--wa)}
.est-badge.eb-ko{background:var(--kob);color:var(--ko)}
.est-badge b{font-size:15px}
.reco{display:flex;gap:8px;padding:8px 10px;border-radius:8px;background:#F0F4FA;font-size:11.5px;line-height:1.5;margin-bottom:6px;color:#333}
.reco span:first-child{font-size:16px}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot.red{background:var(--ko)}
.dot.orange{background:var(--wa)}
.dot.green{background:var(--ok)}
.dot.gray{background:#bbb}
.ready-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px}
.ready-badge.red{background:var(--kob);color:var(--ko)}
.ready-badge.orange{background:var(--wab);color:var(--wa)}
.ready-badge.green{background:var(--okb);color:var(--ok)}
.ready-badge.gray{background:#EEE;color:#888}
/* Module Fiches Categorie C */
.fc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
.fc-tile{aspect-ratio:1;border-radius:10px;border:1.5px solid var(--bd);background:var(--sf);display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:700;font-size:15px;cursor:pointer;font-family:var(--f);color:#555;gap:2px}
.fc-tile span{font-size:14px}
.fc-tile.ok{border-color:var(--ok);background:var(--okb);color:var(--ok)}
.fc-tile.cur{border-color:var(--b);background:var(--sf);color:var(--b);box-shadow:0 0 0 2px rgba(27,58,107,.15)}
.fc-tile.locked{opacity:.45;cursor:not-allowed}
.fc-q{margin-bottom:14px}
.fc-q-txt{font-size:13px;margin-bottom:6px}
.fc-q-txt b{color:var(--b)}
.fc-a-input{width:100%;padding:9px 11px;border-radius:8px;border:1.5px solid var(--bd);font-size:13px;font-family:var(--f)}
.fc-a-input:focus{outline:none;border-color:var(--c)}
.fc-a-input.ok{border-color:var(--ok);background:var(--okb)}
.fc-a-input.ko{border-color:var(--ko);background:var(--kob)}
.fc-corr{font-size:12px;color:var(--ok);margin-top:4px}
.fc-mine{font-size:12px;color:var(--ko);margin-top:2px;text-decoration:line-through}
.fc-mode-sw{display:flex;gap:8px;margin-bottom:1rem}
.fc-mode-sw button{flex:1}
.offbar{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:var(--wa);color:#fff;text-align:center;font-size:12px;font-weight:600;padding:6px;z-index:30}
.offbar.wd{max-width:760px}
.draft-card{background:var(--wab);border:1.5px solid var(--wa);border-radius:12px;padding:1rem;margin-bottom:1rem}
.draft-card .cdt{color:var(--wa)}
.synth-card{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:6px;font-size:12px}
.synth-card.sc-red{background:var(--kob)}
.synth-card.sc-orange{background:var(--wab)}
.synth-card.sc-green{background:var(--okb)}
.synth-card b{display:block;margin-bottom:2px}
/* Espace Avis stagiaire (multi-module) */
.avis-stars{display:flex;gap:6px;font-size:32px;line-height:1}
.avis-stars span{color:#ddd}
.avis-stars span.on{color:var(--wa)}
.avis-q{margin-bottom:14px}
.avis-q-txt{font-size:13px;margin-bottom:6px;font-weight:600}
.avis-scale{display:flex;gap:6px}
.avis-scale button{flex:1;padding:8px 4px;border-radius:8px;border:1.5px solid var(--bd);background:var(--sf);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--f);color:#555;transition:all .15s}
.avis-scale button.sel{border-color:var(--b);background:var(--b);color:#fff}
.avis-done{background:var(--okb);color:var(--ok);border-radius:10px;padding:10px 12px;font-size:12px;margin-bottom:12px}
.avis-txt{width:100%;padding:10px;border-radius:var(--r);border:1px solid var(--bd);font-size:13px;font-family:var(--f);resize:vertical;min-height:90px;box-sizing:border-box}

</style>
</head>

function saveSession(){try{if(CU)localStorage.setItem('etg_session',JSON.stringify(CU));}catch(e){}}
function loadSession(){try{const raw=localStorage.getItem('etg_session');return raw?JSON.parse(raw):null;}catch(e){return null;}}
function clearSession(){try{localStorage.removeItem('etg_session');}catch(e){}}

function draftKey(){return CP?('etg_draft_'+CP.id):null;}
function saveDraft(){const k=draftKey();if(!k||!GD)return;try{localStorage.setItem(k,JSON.stringify(GD));}catch(e){}}
function loadDraft(){const k=draftKey();if(!k)return null;try{const raw=localStorage.getItem(k);return raw?JSON.parse(raw):null;}catch(e){return null;}}
function clearDraft(){const k=draftKey();if(k)try{localStorage.removeItem(k);}catch(e){}}

function pendKey(){return CP?('etg_pending_'+CP.id):null;}

function stepLabel(step){return step==='p3'?'Phase 3 — type d\'erreur':step==='p2'?'Phase 2 — correction':'Phase 1 — vos réponses';}

function draftBanner(){
  const d=loadDraft();
  if(!d)return'';
  return '<div class="cd" style="border-color:var(--b);background:rgba(27,58,107,.05)">'
    +'<div class="cdt">&#128203; Grille en cours — DVD '+d.dvd+' · Série '+d.ser+'</div>'
    +'<div style="font-size:11px;color:var(--mu);margin-bottom:8px">'+stepLabel(d.step)+'</div>'
    +'<button class="btn bp bs" onclick="resumeDraft()">Continuer la grille en cours &#8594;</button></div>';
}

function resumeDraft(){
  const d=loadDraft();
  if(!d)return;
  GD=d;
  document.querySelectorAll('#stb .ti').forEach(x=>x.classList.remove('ac2'));
  const gtab=document.querySelectorAll('#stb .ti')[1];if(gtab)gtab.classList.add('ac2');
  if(GD.step==='p3')rP3();else if(GD.step==='p2')rP2();else rP1();
}

function confirmNewSeries(){
  if(!confirm('Cela supprimera la grille en cours non terminée. Continuer ?'))return;
  clearDraft();GD=null;rGM(true);
}
function addPending(item){const k=pendKey();if(!k)return;let arr=[];try{arr=JSON.parse(localStorage.getItem(k)||'[]');}catch(e){}
  arr.push(item);try{localStorage.setItem(k,JSON.stringify(arr));}catch(e){}updateOffBar();}
function getPending(){const k=pendKey();if(!k)return[];try{return JSON.parse(localStorage.getItem(k)||'[]');}catch(e){return[];}}
function setPending(arr){const k=pendKey();if(k)try{localStorage.setItem(k,JSON.stringify(arr));}catch(e){}updateOffBar();}

function updateOffBar(){
  const bar=document.getElementById('offBar');if(!bar)return;
  const pend=getPending().length;
  if(!navigator.onLine){bar.textContent='&#128268; Hors ligne — vos réponses sont sauvegardées sur cet appareil';bar.classList.remove('H');}
  else if(pend>0){bar.textContent='&#8635; Synchronisation en cours… ('+pend+' série(s) en attente)';bar.classList.remove('H');}
  else bar.classList.add('H');
}
async function trySyncPending(){
  if(!CP)return;
  const arr=getPending();if(!arr.length){updateOffBar();return;}
  const remaining=[];
  for(const item of arr){
    try{await api('series',{m:'POST',b:item});}
    catch(e){remaining.push(item);}
  }
  setPending(remaining);
}
window.addEventListener('online',()=>{updateOffBar();trySyncPending();});
window.addEventListener('offline',updateOffBar);

async function api(p,o){
  const h={'apikey':SK,'Content-Type':'application/json','Prefer':(o&&o.pf)||'return=representation'};
  h['Authorization']='Bearer '+(CU?CU.access_token:SK);
  let r;
  try{
    r=await fetch(SU+'/rest/v1/'+p,{method:(o&&o.m)||'GET',headers:h,body:(o&&o.b)?JSON.stringify(o.b):undefined});
  }catch(netErr){
    throw Object.assign(new Error('Réseau indisponible'),{isNetwork:true});
  }
  if(r.status===401&&CU){
    const ok=CU.refresh_token?await refreshSession():false;
    if(ok){
      h['Authorization']='Bearer '+CU.access_token;
      try{
        r=await fetch(SU+'/rest/v1/'+p,{method:(o&&o.m)||'GET',headers:h,body:(o&&o.b)?JSON.stringify(o.b):undefined});
      }catch(netErr){
        throw Object.assign(new Error('Réseau indisponible'),{isNetwork:true});
      }
    }else{
      throw Object.assign(new Error('Session expirée, veuillez vous reconnecter'),{isAuthError:true});
    }
  }
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||'Erreur');}
  const t=await r.text();return t?JSON.parse(t):null;
}
async function sauth(a,b){
  const r=await fetch(SU+'/auth/v1/'+a,{method:'POST',headers:{'apikey':SK,'Content-Type':'application/json'},body:JSON.stringify(b)});
  return r.json();
}
async function refreshSession(){
  try{
    const r=await sauth('token?grant_type=refresh_token',{refresh_token:CU.refresh_token});
    if(r&&r.access_token){CU=r;saveSession();return true;}
  }catch(e){}
  return false;
}

function sw(m){
  document.getElementById('afl').classList.toggle('H',m!=='l');
  document.getElementById('afs').classList.toggle('H',m!=='s');

}

async function doLogin(){
  const e=document.getElementById('le').value.trim(),p=document.getElementById('lp').value;
  const el=document.getElementById('le2');el.classList.add('H');
  if(!e||!p){showE(el,'Remplissez tous les champs');return;}
  let d;
  try{d=await sauth('token?grant_type=password',{email:e,password:p});}
  catch(err){showE(el,'Connexion impossible — vérifiez votre réseau');return;}
  if(d.error){showE(el,tr(d.error_description||d.error));return;}
  CU=d;saveSession();await loadP();
}

async function doSignup(){
  const n=document.getElementById('rn').value.trim(),e=document.getElementById('re').value.trim();
  const p=document.getElementById('rp').value,c=document.getElementById('rc').value;
  const el=document.getElementById('re2');el.classList.add('H');
  if(!n||!e||!p||!c){showE(el,'Remplissez tous les champs');return;}
  if(p.length<6){showE(el,'Mot de passe trop court (6 min)');return;}
  let d;
  try{d=await sauth('signup',{email:e,password:p,data:{nom:n,categorie:c}});}
  catch(err){showE(el,'Connexion impossible — vérifiez votre réseau');return;}
  if(d.error){showE(el,tr(d.error_description||d.error));return;}
  CU=d;saveSession();await loadP();
}

function saveProfile(){try{if(CP)localStorage.setItem('etg_profile_'+CP.id,JSON.stringify(CP));}catch(e){}}
function loadProfileCache(uid){try{const raw=localStorage.getItem('etg_profile_'+uid);return raw?JSON.parse(raw):null;}catch(e){return null;}}

async function loadP(){
  const cachedCP=(CU&&CU.user)?loadProfileCache(CU.user.id):null;
  let shown=false;
  if(cachedCP){
    CP=cachedCP;
    enterApp();
    updateOffBar();
    shown=true;
  }
  try{
    const ps=await api('profiles?id=eq.'+CU.user.id+'&select=*');
    if(ps&&ps.length){CP=ps[0];}
    else{
      const m=CU.user.user_metadata||{};
      CP={id:CU.user.id,nom:m.nom||'Utilisateur',email:CU.user.email,categorie:m.categorie||'B',role:'stagiaire'};
      await api('profiles',{m:'POST',b:CP});
      const fr=await api('profiles?id=eq.'+CU.user.id+'&select=*');
      if(fr&&fr.length)CP=fr[0];
    }
    saveProfile();
    if(!shown)enterApp();
    trySyncPending();
    updateOffBar();
  }catch(e){
    console.error(e);
    if(e&&e.isAuthError){
      CU=null;CP=null;clearSession();
      document.getElementById('sap').classList.add('H');
      document.getElementById('sa').classList.remove('H');
      sw('l');
    }else if(!(e&&e.isNetwork)&&!shown){
      CU=null;clearSession();
    }
  }
}

/* Affiche le cadre applicatif ET priorise la reprise d'un brouillon en cours,
   SANS jamais passer par un écran qui dépend du réseau (accueil/stats) tant qu'un
   brouillon existe — pour que la reprise fonctionne même hors-ligne. */
function enterApp(){
  document.getElementById('sa').classList.add('H');
  document.getElementById('sap').classList.remove('H');
  if(CP.role==='formateur'){
    document.getElementById('aht').textContent='Espace Formateur';
    document.getElementById('ahs').textContent=CP.nom;
    document.getElementById('ftb').classList.remove('H');
    document.getElementById('sap').classList.add('wd');
    document.getElementById('offBar').classList.add('wd');
    fTab('s',document.querySelector('#ftb .ti'));
  }else{
    document.getElementById('aht').textContent='Mon suivi ETG';
    document.getElementById('ahs').textContent=CP.nom+' · '+CP.categorie;
    document.getElementById('stb').classList.remove('H');
    document.getElementById('tiFC').classList.add('H');
    document.getElementById('tiFD').classList.add('H');
    document.getElementById('tiFCE').classList.add('H');
    document.getElementById('tiCIRC').classList.add('H');
    const mod=moduleForCat(CP.categorie);
    if(mod==='C'){document.getElementById('tiFC').classList.remove('H');document.getElementById('tiCIRC').classList.remove('H');}
    if(mod==='D')document.getElementById('tiFD').classList.remove('H');
    if(mod==='CE')document.getElementById('tiFCE').classList.remove('H');
    const draft=loadDraft();
    if(draft){
      GD=draft;
      document.querySelectorAll('#stb .ti').forEach(x=>x.classList.remove('ac2'));
      if(GD.step==='p3')rP3();else if(GD.step==='p2')rP2();else rP1();
    }else{
      stag('a',document.querySelector('#stb .ti'));
    }
  }
}

function showE(el,m){el.textContent=m;el.classList.remove('H');}
function tr(m){
  if(!m)return'Erreur';
  if(m.includes('Invalid login'))return'Email ou mot de passe incorrect';
  if(m.includes('already registered'))return'Email déjà utilisé';
  if(m.includes('Password'))return'Mot de passe trop court (6 min)';
  return m;
}

function stag(t,el){
  document.querySelectorAll('#stb .ti').forEach(x=>x.classList.remove('ac2'));
  if(el)el.classList.add('ac2');
  if(t==='a')rAcc();
  else if(t==='g')rGM();
  else if(t==='h')rHisto();
  else if(t==='fc')rFC();
  else if(t==='fd')rFD();
  else if(t==='fce')rFCE();
  else if(t==='circ')rCirc();
}

async function rAcc(){
  const mc=document.getElementById('mc');
  mc.innerHTML='<div class="empty">Chargement...</div>';
  let sr=[],ex=[];
  try{
    const res=await Promise.all([
      api('series?stagiaire_id=eq.'+CP.id+'&order=created_at.desc&select=*'),
      api('etg_resultats?stagiaire_id=eq.'+CP.id+'&order=date.desc&select=*').catch(()=>[])
    ]);
    sr=res[0]||[];ex=(res[1]||[]).filter(function(e){return !e.module||e.module==='etg';});
  }catch(e){
    mc.innerHTML=draftBanner()+'<div class="empty">&#128268; Impossible de charger vos données (hors ligne).<br>Réessayez dès que la connexion revient.</div>'
      +'<button class="btn ba mt" onclick="rAcc()">&#8635; Réessayer</button>';
    return;
  }
  sr=sr.filter(s=>!s.exclu);
  window._S.accSr=sr;
  window._S.accEx=ex;
  const isN=CP.categorie==='B';
  const obj=isN?{min:10,max:20}:{min:8,max:10};
  const jours=[...new Set((sr||[]).map(s=>s.date))].length;
  const pct=Math.min(100,Math.round(jours/obj.min*100));
  const moy=(sr||[]).length?(sr.reduce((a,s)=>a+s.score,0)/sr.length).toFixed(1):'—';
  const taux=(sr||[]).length?Math.round(sr.filter(s=>s.score>=35).length/sr.length*100):0;

/* ===================== ESPACE AVIS STAGIAIRE (MULTI-MODULE) =====================
   Un avis PAR STAGIAIRE ET PAR MODULE (etg / hors_circulation / circulation).
   L'avis n'est accessible qu'APRES avoir cliqué "Fin de formation" sur le module
   concerné. Les étoiles ne sont JAMAIS saisies à la main : la note globale est la
   MOYENNE (arrondie) des réponses du questionnaire, affichée immédiatement à la fin.
   3 questionnaires distincts (certaines questions communes sont volontairement
   reprises), stockés séparément (upsert sur (stagiaire_id, module)). */
const AVIS_MODULES={
  etg:[
    'Qualité pédagogique des enseignements',
    'Disponibilité et écoute du formateur',
    "Adéquation du contenu de la formation avec les épreuves de l'examen",
    'Qualité des supports pédagogiques (application, fiches, panneaux...)',
    'Organisation générale et ambiance de la formation'
  ],
  hors_circulation:[
    'Qualité pédagogique des enseignements',
    'Disponibilité et écoute du formateur',
    "Pertinence des questions écrites et des fiches par rapport à l'examen hors circulation",
    'Qualité des supports pédagogiques (fiches, panneaux, application...)',
    'Organisation générale de la formation'
  ],
  circulation:[
    'Qualité pédagogique des enseignements',
    'Disponibilité et écoute du formateur',
    "Qualité de l'accompagnement en conduite et des mises en situation réelles",
    "Adéquation de la préparation avec l'épreuve de circulation",
    'Organisation générale de la formation'
  ]
};
const MODULE_LABEL={etg:'ETG (Code de la route)',hors_circulation:'Hors circulation',circulation:'Circulation'};

/* Petit rendu d'étoiles en lecture seule (formateur + écran de confirmation). */
function starsRO(n){var s='';for(var k=1;k<=5;k++)s+='<span style="color:'+(k<=n?'#E8A33D':'#ddd')+'">★</span>';return '<span style="font-size:18px;line-height:1">'+s+'</span>';}

/* Ouvre le questionnaire d'avis d'un module (pré-rempli si un avis existe déjà).
   opts = { back:'<appel JS de retour>', pdf:'<module>'|null }  */
async function startAvis(module,opts){
  opts=opts||{};
  const mc=document.getElementById('mc');
  mc.innerHTML='<div class="empty">Chargement...</div>';
  let existing=null;
  try{const rows=await api('avis_stagiaire?stagiaire_id=eq.'+CP.id+'&module=eq.'+module+'&select=*');existing=(rows&&rows[0])||null;}catch(e){}
  const qs=AVIS_MODULES[module];
  window._avisCtx={module:module,opts:opts,
    commentaire:existing?(existing.commentaire||''):'',
    q:qs.map(function(q){if(existing&&Array.isArray(existing.questionnaire)){var f=existing.questionnaire.find(function(x){return x.question===q;});return f?f.note:0;}return 0;})};
  rAvisForm(!!existing);
}

function rAvisForm(hasExisting){
  const mc=document.getElementById('mc');
  const ctx=window._avisCtx;
  const qs=AVIS_MODULES[ctx.module];
  mc.innerHTML='<h2 class="pt">⭐ Votre avis — '+esc(MODULE_LABEL[ctx.module])+'</h2>'
    +(hasExisting?'<div class="avis-done">Vous avez déjà laissé un avis pour ce module — vous pouvez le modifier ci-dessous.</div>':'')
    +'<div class="cd">'
    +'<p style="font-size:12px;color:var(--mu);margin-bottom:12px">Notez chaque item de 1 (insuffisant) à 5 (excellent). La note globale en étoiles est calculée automatiquement à partir de vos réponses.</p>'
    +qs.map(function(q,i){return '<div class="avis-q"><div class="avis-q-txt">'+esc(q)+'</div>'
      +'<div class="avis-scale" id="avisQ'+i+'">'+[1,2,3,4,5].map(function(n){return '<button data-n="'+n+'" onclick="setAvisQ('+i+','+n+')">'+n+'</button>';}).join('')+'</div></div>';}).join('')
    +'<div class="avis-q"><div class="avis-q-txt">Commentaire libre (points forts, axes d\'amélioration...)</div>'
    +'<textarea class="avis-txt" id="avisComment" placeholder="Votre ressenti...">'+esc(ctx.commentaire)+'</textarea></div>'
    +'<button class="btn bp mt" style="width:100%" onclick="submitAvis()">'+(hasExisting?'Mettre à jour mon avis':'Valider mon avis')+'</button>'
    +'</div>';
  qs.forEach(function(q,i){paintAvisScale(i);});
}
function setAvisQ(i,n){window._avisCtx.q[i]=n;paintAvisScale(i);}
function paintAvisScale(i){
  const wrap=document.getElementById('avisQ'+i);if(!wrap)return;
  wrap.querySelectorAll('button').forEach(function(b){b.classList.toggle('sel',parseInt(b.dataset.n,10)===window._avisCtx.q[i]);});
}

async function submitAvis(){
  const ctx=window._avisCtx;
  ctx.commentaire=(document.getElementById('avisComment')||{}).value||'';
  if(ctx.q.some(function(n){return !n;})){alert('Merci de répondre à toutes les questions du questionnaire.');return;}
  const qs=AVIS_MODULES[ctx.module];
  const note=Math.round(ctx.q.reduce(function(a,b){return a+b;},0)/ctx.q.length);
  const questionnaire=qs.map(function(q,i){return {question:q,note:ctx.q[i]};});
  const body={stagiaire_id:CP.id,module:ctx.module,note_globale:note,questionnaire:questionnaire,commentaire:ctx.commentaire,updated_at:new Date().toISOString()};
  try{
    await api('avis_stagiaire?on_conflict=stagiaire_id,module',{m:'POST',b:body,pf:'resolution=merge-duplicates,return=minimal'});
  }catch(e){
    if(e&&e.isNetwork){alert('Impossible d\'enregistrer votre avis hors connexion. Réessayez une fois reconnecté.');return;}
    alert('Erreur lors de l\'enregistrement : '+e.message);return;
  }
  rAvisResult(ctx.module,note,ctx.opts);
}

/* Écran de confirmation : étoiles auto affichées immédiatement + PDF éventuel. */
function rAvisResult(module,note,opts){
  opts=opts||{};
  const mc=document.getElementById('mc');
  mc.innerHTML='<h2 class="pt">Merci !</h2>'
    +'<div class="cd" style="text-align:center">'
    +'<p style="font-size:13px;margin-bottom:8px">Votre avis sur le module <b>'+esc(MODULE_LABEL[module])+'</b> a bien été enregistré.</p>'
    +'<div style="margin:8px 0">'+starsRO(note)+'</div>'
    +'<p style="font-size:13px;color:var(--mu)">Note globale calculée : <b>'+note+'/5</b></p>'
    +'</div>'
    +'<div class="rw mt">'
    +(opts.pdf?'<button class="btn bp bs" style="flex:1" onclick="dlModulePDF(\''+opts.pdf+'\')">📄 Télécharger le PDF du module</button>':'')
    +'<button class="btn bg bs" style="flex:1'+(opts.pdf?';margin-left:8px':'')+'" onclick="'+(opts.back||'').replace(/"/g,'&quot;')+'">Retour</button>'
    +'</div>';
}

/* ===================== PDF DE SYNTHÈSE PAR MODULE (Hors circulation) ===================== */
async function dlModulePDF(module){
  let rows=[],a=null;
  try{rows=await api('etg_resultats?stagiaire_id=eq.'+CP.id+'&module=eq.'+module+'&order=date.desc&select=*')||[];}catch(e){}
  try{const av=await api('avis_stagiaire?stagiaire_id=eq.'+CP.id+'&module=eq.'+module+'&select=*');a=(av&&av[0])||null;}catch(e){}
  genModulePDF(CP,module,rows,a);
}
function genModulePDF(stagData,module,rows,avisData){
  const info=module==='circulation'?{max:31,seuil:20}:{max:27,seuil:17};
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF();
  const hasAT=typeof doc.autoTable==='function';
  const pageW=doc.internal.pageSize.getWidth(),pageH=doc.internal.pageSize.getHeight();
  const M=14;let y;
  const checkPage=function(need){if(y+need>pageH-16){doc.addPage();y=20;}};
  const sectionTitle=function(t){checkPage(14);doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(27,58,107);doc.text(t,M,y);doc.setTextColor(0,0,0);doc.setFont('helvetica','normal');y+=7;};
  doc.setFillColor(27,58,107);doc.rect(0,0,pageW,30,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(16);
  doc.text('Bilan de formation — '+(MODULE_LABEL[module]||module),pageW/2,13,{align:'center'});
  doc.setFont('helvetica','normal');doc.setFontSize(10);
  doc.text((stagData.nom||'')+'  ·  Catégorie '+(stagData.categorie||''),pageW/2,20,{align:'center'});
  doc.setFontSize(8);
  doc.text((stagData.email||'')+'  ·  Généré le '+new Date().toLocaleDateString('fr-FR'),pageW/2,26,{align:'center'});
  doc.setTextColor(0,0,0);y=40;
  sectionTitle('Résultats à l\'épreuve');
  if(rows&&rows.length){
    const body=rows.map(function(e){return [e.date,e.score+'/'+info.max,e.score>=info.seuil?'Admis':'Non admis'];});
    if(hasAT){
      doc.autoTable({startY:y,margin:{left:M,right:M},theme:'grid',head:[['Date','Score','Résultat']],body:body,
        headStyles:{fillColor:[27,58,107],textColor:255,fontSize:9},bodyStyles:{fontSize:9},alternateRowStyles:{fillColor:[247,248,250]},
        columnStyles:{2:{fontStyle:'bold'}},
        didParseCell:function(d){if(d.section==='body'&&d.column.index===2){d.cell.styles.textColor=d.cell.raw==='Admis'?[42,157,92]:[214,69,69];}}});
      y=doc.lastAutoTable.finalY+10;
    }else{doc.setFontSize(9);body.forEach(function(r){checkPage(6);doc.text(r.join('   —   '),M,y);y+=5.5;});y+=6;}
  }else{doc.setFontSize(9);doc.setTextColor(130,130,130);doc.text('Aucun résultat déclaré pour le moment.',M,y);doc.setTextColor(0,0,0);y+=10;}
  if(avisData){
    sectionTitle('Avis du stagiaire sur la formation');
    checkPage(10);doc.setFontSize(9);doc.text('Note globale : '+avisData.note_globale+'/5',M,y);y+=7;
    const qRows=(avisData.questionnaire||[]).map(function(q){return [q.question,q.note+'/5'];});
    if(qRows.length){
      if(hasAT){doc.autoTable({startY:y,margin:{left:M,right:M},theme:'grid',head:[['Question','Note']],body:qRows,
        headStyles:{fillColor:[27,58,107],textColor:255,fontSize:9},bodyStyles:{fontSize:8.5},alternateRowStyles:{fillColor:[247,248,250]}});
        y=doc.lastAutoTable.finalY+6;}
      else{doc.setFontSize(8.5);qRows.forEach(function(r){checkPage(6);doc.text(r.join('   —   '),M,y);y+=5.5;});y+=4;}
    }
    if(avisData.commentaire){
      checkPage(14);doc.setFont('helvetica','bold');doc.setFontSize(9);doc.text('Commentaire :',M,y);y+=5;doc.setFont('helvetica','normal');
      const lines=doc.splitTextToSize(avisData.commentaire,pageW-2*M);lines.forEach(function(l){checkPage(6);doc.text(l,M,y);y+=5;});
    }
  }
  const pageCount=doc.internal.getNumberOfPages();
  for(let p=1;p<=pageCount;p++){doc.setPage(p);doc.setFontSize(8);doc.setTextColor(150,150,150);
    doc.text('Suivi formation — CFPC Georges Hoareau',M,pageH-8);doc.text('Page '+p+'/'+pageCount,pageW-M,pageH-8,{align:'right'});doc.setTextColor(0,0,0);}

/* Rend un mini-graphique Chart.js hors-écran et le convertit en image PNG pour le PDF.
   Retourne null si Chart.js n'est pas disponible ou en cas d'erreur (le PDF reste généré sans le graphique). */
function chartToImage(type,data,extraOpts,w,h){
  if(typeof Chart==='undefined')return null;
  try{
    const canvas=document.createElement('canvas');
    canvas.width=w;canvas.height=h;
    const chart=new Chart(canvas.getContext('2d'),{type,data,
      options:Object.assign({responsive:false,animation:false,plugins:{legend:{display:false}}},extraOpts)});
    const img=canvas.toDataURL('image/png');
    chart.destroy();
    return img;
  }catch(e){return null;}
}

function genPDF(stagData,seriesData,exData,avisData){
  const active=(seriesData||[]).filter(s=>!s.exclu).slice().sort((a,b)=>a.date<b.date?-1:(a.date>b.date?1:0));
  exData=(exData||[]).slice().sort((a,b)=>a.date<b.date?-1:(a.date>b.date?1:0));
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF();
  const hasAT=typeof doc.autoTable==='function';
  const pageW=doc.internal.pageSize.getWidth(),pageH=doc.internal.pageSize.getHeight();
  const M=14;
  let y;

  const checkPage=(need)=>{if(y+need>pageH-16){doc.addPage();y=20;}};
  const sectionTitle=(t)=>{
    checkPage(14);
    doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(27,58,107);
    doc.text(t,M,y);doc.setTextColor(0,0,0);doc.setFont('helvetica','normal');
    y+=7;
  };

  /* ---------- En-tête ---------- */
  doc.setFillColor(27,58,107);doc.rect(0,0,pageW,30,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(17);
  doc.text('Bilan de formation ETG',pageW/2,13,{align:'center'});
  doc.setFont('helvetica','normal');doc.setFontSize(10);
  doc.text((stagData.nom||'')+'  ·  Catégorie '+(stagData.categorie||''),pageW/2,20,{align:'center'});
  doc.setFontSize(8);
  doc.text((stagData.email||'')+'  ·  Généré le '+new Date().toLocaleDateString('fr-FR'),pageW/2,26,{align:'center'});
  doc.setTextColor(0,0,0);doc.setFont('helvetica','normal');
  y=40;

  /* ---------- Indicateurs clés ---------- */
  const jours=[...new Set(active.map(s=>s.date))].length;
  const moy=active.length?(active.reduce((a,s)=>a+s.score,0)/active.length).toFixed(1):'—';
  const taux=active.length?Math.round(active.filter(s=>s.score>=35).length/active.length*100):0;
  const serJour=active.length&&jours?(active.length/jours).toFixed(1):'0';
  const kpis=[{v:serJour,l:'Séries / jour (moy.)'},{v:String(jours),l:'Jours de formation'},{v:moy+'/40',l:'Score moyen'},{v:taux+'%',l:'Taux de réussite'}];
  const gap=4,cardW=(pageW-2*M-gap*3)/4,cardH=20;
  kpis.forEach((k,i)=>{
    const x=M+i*(cardW+gap);
    doc.setDrawColor(229,229,229);doc.setFillColor(247,248,250);
    doc.roundedRect(x,y,cardW,cardH,2,2,'FD');
    doc.setTextColor(27,58,107);doc.setFont('helvetica','bold');doc.setFontSize(14);
    doc.text(k.v,x+cardW/2,y+10,{align:'center'});
    doc.setTextColor(120,120,120);doc.setFont('helvetica','normal');doc.setFontSize(7);
    doc.text(k.l,x+cardW/2,y+16,{align:'center'});
  });
  doc.setTextColor(0,0,0);
  y+=cardH+10;

  /* ---------- Courbes de progression (données réelles) ---------- */
  const chartW=pageW-2*M,chartH=chartW*0.42;
  if(active.length>1){
    const labs=active.map(s=>s.date);
    const scores=active.map(s=>s.score);
    const perfColors=scores.map(sc=>sc>=35?'#2A9D5C':(sc>=30?'#E8A33D':'#D64545'));
    const imgPerf=chartToImage('line',{labels:labs,datasets:[
      {data:scores,borderColor:'#1B3A6B',backgroundColor:'rgba(27,58,107,.12)',tension:.25,fill:true,pointBackgroundColor:perfColors,pointRadius:4,borderWidth:2},
      {data:labs.map(()=>35),borderColor:'#2A9D5C',borderDash:[6,4],pointRadius:0,fill:false,borderWidth:1.5}
    ]},{scales:{y:{min:0,max:40,ticks:{stepSize:10}},x:{ticks:{maxTicksLimit:8,font:{size:9}}}}},900,380);

    const ests=active.map(s=>getEstim(s.questions));
    const mins=ests.map(e=>e.min),maxs=ests.map(e=>e.max);
    const ptColors=active.map((s,i)=>{const eb=estimBadge(s.score,ests[i].min,ests[i].max,ests[i].ecart);return eb.color==='ok'?'#2A9D5C':(eb.color==='ko'?'#D64545':'#E8A33D');});
    const imgFiab=chartToImage('line',{labels:labs,datasets:[
      {data:mins,borderColor:'transparent',pointRadius:0,fill:false},
      {data:maxs,borderColor:'transparent',backgroundColor:'rgba(108,180,232,.30)',pointRadius:0,fill:'-1'},
      {data:scores,borderColor:'#1B3A6B',borderWidth:2,tension:.25,fill:false,pointBackgroundColor:ptColors,pointRadius:4}
    ]},{scales:{y:{min:0,max:40,ticks:{stepSize:10}},x:{ticks:{maxTicksLimit:8,font:{size:9}}}}},900,380);

    if(imgPerf){
      sectionTitle('Évolution de la performance');
      checkPage(chartH+10);
      doc.addImage(imgPerf,'PNG',M,y,chartW,chartH);y+=chartH+3;
      doc.setFontSize(7.5);doc.setTextColor(130,130,130);
      doc.text('Seuil de réussite : 35/40 (ligne pointillée verte)',M,y);doc.setTextColor(0,0,0);
      y+=9;
    }
    if(imgFiab){
      sectionTitle('Fiabilité — estimation vs résultat réel');
      checkPage(chartH+10);
      doc.addImage(imgFiab,'PNG',M,y,chartW,chartH);y+=chartH+3;
      doc.setFontSize(7.5);doc.setTextColor(130,130,130);
      doc.text('Bande bleue = estimation [min–max] avant correction. Point coloré = résultat réel.',M,y);doc.setTextColor(0,0,0);
      y+=10;
    }
  }else{
    sectionTitle('Évolution de la performance');
    doc.setFontSize(9);doc.setTextColor(130,130,130);
    doc.text('Pas encore assez de séries pour afficher une courbe de progression (minimum 2).',M,y);
    doc.setTextColor(0,0,0);y+=10;
  }

  /* ---------- Répartition des erreurs ---------- */
  let e1=0,e2=0,e3=0;
  active.forEach(s=>(s.questions||[]).forEach(q=>{
    if(q.typeErreur===1)e1++;else if(q.typeErreur===2)e2++;else if(q.typeErreur===3)e3++;
  }));
  sectionTitle('Répartition des erreurs par cause');
  if(e1+e2+e3>0){
    if(hasAT){
      doc.autoTable({startY:y,margin:{left:M,right:M},theme:'grid',
        head:[['Connaissance','Compréhension','Concentration']],
        body:[[String(e1),String(e2),String(e3)]],
        headStyles:{fillColor:[27,58,107],textColor:255,fontSize:9,halign:'center'},
        bodyStyles:{fontSize:12,halign:'center',fontStyle:'bold',textColor:[27,58,107]}
      });
      y=doc.lastAutoTable.finalY+10;
    }else{
      doc.setFontSize(9);
      doc.text('Connaissance : '+e1+'   ·   Compréhension : '+e2+'   ·   Concentration : '+e3,M,y);
      y+=10;
    }
  }else{
    doc.setFontSize(9);doc.setTextColor(130,130,130);
    doc.text('Aucune erreur classée pour le moment.',M,y);doc.setTextColor(0,0,0);y+=10;
  }

  /* ---------- Résultats à l'examen ETG officiel ---------- */
  sectionTitle('Résultats à l\'examen ETG officiel');
  if(exData.length){
    const rows=exData.map(e=>[e.date,e.score+'/40',e.score>=35?'Admis':'Non admis']);
    if(hasAT){
      doc.autoTable({startY:y,margin:{left:M,right:M},theme:'grid',
        head:[['Date','Score','Résultat']],body:rows,
        headStyles:{fillColor:[27,58,107],textColor:255,fontSize:9},
        bodyStyles:{fontSize:9},alternateRowStyles:{fillColor:[247,248,250]},
        columnStyles:{2:{fontStyle:'bold'}},
        didParseCell:(d)=>{if(d.section==='body'&&d.column.index===2){d.cell.styles.textColor=d.cell.raw==='Admis'?[42,157,92]:[214,69,69];}}
      });
      y=doc.lastAutoTable.finalY+10;
    }else{
      doc.setFontSize(9);
      rows.forEach(r=>{checkPage(6);doc.text(r.join('   —   '),M,y);y+=5.5;});
      y+=6;
    }
  }else{
    doc.setFontSize(9);doc.setTextColor(130,130,130);
    doc.text('Aucun résultat déclaré pour le moment.',M,y);doc.setTextColor(0,0,0);y+=10;
  }

  /* ---------- Historique complet des séries (données réelles) ---------- */
  sectionTitle('Historique complet des séries d\'entraînement');
  if(active.length){
    const rows=active.map(s=>[s.date,s.dvd||'?',s.serie||'?',s.score+'/40',s.score>=35?'Réussie':'Échouée']);
    if(hasAT){
      doc.autoTable({startY:y,margin:{left:M,right:M},theme:'grid',
        head:[['Date','DVD','Série','Score','Résultat']],body:rows,
        headStyles:{fillColor:[27,58,107],textColor:255,fontSize:9},
        bodyStyles:{fontSize:8.5},alternateRowStyles:{fillColor:[247,248,250]},
        columnStyles:{4:{fontStyle:'bold'}},
        didParseCell:(d)=>{if(d.section==='body'&&d.column.index===4){d.cell.styles.textColor=d.cell.raw==='Réussie'?[42,157,92]:[214,69,69];}}
      });
      y=doc.lastAutoTable.finalY+6;
    }else{
      doc.setFontSize(8.5);
      rows.forEach(r=>{checkPage(6);doc.text(r.join('   —   '),M,y);y+=5.5;});
    }
  }else{
    doc.setFontSize(9);doc.setTextColor(130,130,130);
    doc.text('Aucune série enregistrée pour le moment.',M,y);doc.setTextColor(0,0,0);
  }

  /* ---------- Avis du stagiaire sur la formation (ETG) ---------- */
  if(avisData){
    sectionTitle('Avis du stagiaire sur la formation');
    checkPage(10);doc.setFontSize(9);doc.text('Note globale : '+avisData.note_globale+'/5',M,y);y+=7;
    var qRows=(avisData.questionnaire||[]).map(function(q){return [q.question,q.note+'/5'];});
    if(qRows.length){
      if(hasAT){doc.autoTable({startY:y,margin:{left:M,right:M},theme:'grid',head:[['Question','Note']],body:qRows,headStyles:{fillColor:[27,58,107],textColor:255,fontSize:9},bodyStyles:{fontSize:8.5},alternateRowStyles:{fillColor:[247,248,250]}});y=doc.lastAutoTable.finalY+6;}
      else{doc.setFontSize(8.5);qRows.forEach(function(r){checkPage(6);doc.text(r.join('   -   '),M,y);y+=5.5;});y+=4;}
    }
    if(avisData.commentaire){checkPage(14);doc.setFont('helvetica','bold');doc.setFontSize(9);doc.text('Commentaire :',M,y);y+=5;doc.setFont('helvetica','normal');var lns=doc.splitTextToSize(avisData.commentaire,pageW-2*M);lns.forEach(function(l){checkPage(6);doc.text(l,M,y);y+=5;});}
  }

  /* ---------- Pied de page (numérotation sur toutes les pages) ---------- */
  const pageCount=doc.internal.getNumberOfPages();
  for(let p=1;p<=pageCount;p++){
    doc.setPage(p);
    doc.setFontSize(8);doc.setTextColor(150,150,150);
    doc.text('Suivi ETG — CFPC Georges Hoareau',M,pageH-8);
    doc.text('Page '+p+'/'+pageCount,pageW-M,pageH-8,{align:'right'});
    doc.setTextColor(0,0,0);
  }

  doc.save('bilan-etg-'+(stagData.nom||'stagiaire').replace(/\s+/g,'_')+'.pdf');
}

function startG(){
  const dvd=document.getElementById('gdvd').value.trim();
  const ser=document.getElementById('gser').value.trim();
  const date=document.getElementById('gd').value;
  if(!dvd||!ser){alert('Veuillez saisir le n° DVD et le n° série');return;}
  GD={date,dvd,ser,step:'p1',
    reps:Array(40).fill(null).map(()=>({r:[],c:null})),
    bon:Array(40).fill(null).map(()=>[]),
    te:Array(40).fill(null)
  };
  saveDraft();
  rP1();
}

function abandonG(){
  if(!confirm('Abandonner cette série en cours ? Vos réponses seront perdues.'))return;
  clearDraft();GD=null;rGM();
}

function rP1(){
  window.scrollTo(0,0);
  GD.step='p1';saveDraft();
  const n=GD.reps.filter(r=>r.r.length>0&&r.c).length;
  document.getElementById('mc').innerHTML=
    '<span class="ph">Phase 1 — Vos réponses ('+n+'/40)</span>'
    +'<div style="font-size:12px;color:var(--mu);margin-bottom:6px">DVD <b>'+GD.dvd+'</b> · Série <b>'+GD.ser+'</b></div>'
    +'<p style="font-size:12px;color:var(--mu);margin-bottom:10px">Cochez vos réponses (plusieurs possibles) et votre niveau de certitude.</p>'
    +'<div class="cd" style="padding:.5rem .75rem" id="ql"></div>'

}

function rQL(){
  const l=document.getElementById('ql');if(!l)return;
  l.innerHTML=GD.reps.map((r,i)=>{
    const certCls=r.c==='sure'?'sure':r.c==='doubt'?'doubt':r.c==='guess'?'guess':'';
    const certLbl=r.c==='sure'?'✓ Sûr':r.c==='doubt'?'? Doute':r.c==='guess'?'✗ Ne sait pas':'';
    return '<div class="qr2">'
      +'<div class="qnum">Question '+(i+1)+'</div>'
      +'<div class="rep-btns">'
      +['A','B','C','D'].map(x=>'<button class="rb2'+(r.r.includes(x)?' sel':'')+'" onclick="tR('+i+',\''+x+'\')">'+x+'</button>').join('')
      +'</div>'
      +'<div class="cert-btns">'
      +'<button class="cb '+(r.c==='sure'?'sure':'')+'" onclick="sC('+i+',\'sure\')">✓ Sûr</button>'
      +'<button class="cb '+(r.c==='doubt'?'doubt':'')+'" onclick="sC('+i+',\'doubt\')">? Doute</button>'
      +'<button class="cb '+(r.c==='guess'?'guess':'')+'" onclick="sC('+i+',\'guess\')">✗ Ne sait pas</button>'
      +'</div></div>';

}

function tR(i,v){
  const arr=GD.reps[i].r;
  const idx=arr.indexOf(v);
  if(idx===-1)arr.push(v);else arr.splice(idx,1);
  rQL();upPh();saveDraft();
}
function sC(i,v){GD.reps[i].c=v;rQL();upPh();saveDraft();}
function upPh(){
  const el=document.querySelector('.ph');
  if(el){const n=GD.reps.filter(r=>r.r.length>0&&r.c).length;el.textContent='Phase 1 — Vos réponses ('+n+'/40)';}
}

function goP2(){
  const miss=GD.reps.filter(r=>!r.r.length||!r.c).length;
  if(miss>0&&!confirm(miss+' question(s) incomplète(s). Continuer quand même ?'))return;
  rEstim();
}

function rEstim(){
  window.scrollTo(0,0);
  const min=GD.reps.filter(r=>r.c==='sure').length;
  const max=min+GD.reps.filter(r=>r.c==='doubt').length;

    '<span class="ph">Votre estimation</span>'

function rP2(){
  window.scrollTo(0,0);
  GD.step='p2';saveDraft();
  document.getElementById('mc').innerHTML=
    '<span class="ph">Phase 2 — Correction</span>'
    +'<div style="font-size:12px;color:var(--mu);margin-bottom:6px">DVD <b>'+GD.dvd+'</b> · Série <b>'+GD.ser+'</b></div>'
    +'<p style="font-size:12px;color:var(--mu);margin-bottom:10px">Cochez les bonnes réponses — votre grille se colorie automatiquement.</p>'
    +'<div class="cd" style="padding:.5rem .75rem" id="cl"></div>'
    +'<div class="cd" id="liveScoreCard" style="text-align:center;margin-top:10px"></div>'
    +'<div class="rw mt">'
    +'<button class="btn bg bs" onclick="rP1()">← Retour</button>'
    +'<button class="btn bp bs" onclick="goP3()" style="flex:1;margin-left:8px">Continuer →</button>'
    +'</div>';
  rCL();
  updateLiveScore();
}

function computeLiveScore(){
  return GD.reps.reduce((acc,r,i)=>{
    const bon=GD.bon[i];
    if(!bon.length)return acc;
    const rs=[...r.r].sort().join(''),bs=[...bon].sort().join('');
    return acc+(rs.length>0&&rs===bs?1:0);
  },0);
}
function updateLiveScore(){
  const el=document.getElementById('liveScoreCard');
  if(!el)return;
  const score=computeLiveScore();
  const nbCorr=GD.bon.filter(b=>b.length>0).length;
  el.innerHTML='<div style="font-size:11px;color:var(--mu);margin-bottom:4px">Votre résultat (mis à jour en direct'+(nbCorr<40?' — '+nbCorr+'/40 corrigées':'')+')</div>'
    +'<div style="font-size:32px;font-weight:700;color:var(--b)">'+score+'<span style="font-size:16px;color:var(--mu)"> /40</span></div>';
}

function rCL(){
  const l=document.getElementById('cl');if(!l)return;
  l.innerHTML=GD.reps.map((r,i)=>{
    const bon=GD.bon[i];
    const hasBon=bon.length>0;
    const certCls=r.c==='sure'?'cb-sure':r.c==='doubt'?'cb-doubt':'cb-guess';
    const certLbl=r.c==='sure'?'✓ Sûr':r.c==='doubt'?'? Doute':'✗ Ne sait pas';
    const rs=[...r.r].sort().join('');
    const bs=[...bon].sort().join('');
    const correct=rs.length>0&&bs.length>0&&rs===bs;
    const repBtns=['A','B','C','D'].map(x=>{
      const wasCkd=r.r.includes(x);
      const isBon=bon.includes(x);
      let cls='';
      if(hasBon){
        if(wasCkd&&isBon)cls=' corr-ok';
        else if(wasCkd&&!isBon)cls=' corr-ko';
        else if(!wasCkd&&isBon)cls=' corr-miss';
        else cls='';
      }else{
        if(wasCkd)cls=' sel';
      }
      const cross=hasBon&&wasCkd&&!isBon?'<span style="position:absolute;font-size:18px;color:var(--ko);">✕</span>':'';
      return '<div class="rc2'+cls+'" style="position:relative">'+x+cross+'</div>';
    }).join('');
    return '<div class="qr3">'
      +'<div class="q3head">'

/* ===================== ANALYSE : 5 catégories, estimation, fiabilité ===================== */
function getA(qs){
  let ve=0,pg=0,ac=0,pc=0,cc=0;
  (qs||[]).forEach(q=>{
    if(!q.bonne||!q.bonne.length)return;
    if(q.cert==='sure'&&q.correct)ac++;
    else if(q.cert==='sure'&&!q.correct)ve++;
    else if(q.cert==='doubt'&&q.correct)pc++;
    else if(q.cert==='doubt'&&!q.correct)pg++;
    else if(q.cert==='guess'&&q.correct)cc++;
    else if(q.cert==='guess'&&!q.correct)pg++;
  });
  return{ve,pg,ac,pc,cc,bl:ve,co:pc,so:ac,vi:cc,ne:pg};
}
function getEstim(qs){
  const min=(qs||[]).filter(q=>q.cert==='sure').length;
  const max=min+(qs||[]).filter(q=>q.cert==='doubt').length;
  return{min,max,ecart:max-min};
}
function estimBadge(score,min,max,ecart){
  const zone=score<min?'below':(score>max?'above':'in');
  const level=ecart<=5?'stable':(ecart<=10?'mid':'wide');
  const colors={stable:{below:'ko',in:'ok',above:'wa'},mid:{below:'ko',in:'wa',above:'wa'},wide:{below:'ko',in:'wa',above:'ok'}};
  const labels={
    stable:{below:'Surestimation — remise en question',in:'Fiable — vous vous connaissez bien',above:'Sous-estimation — prenez confiance'},
    mid:{below:'Surestimation — remise en question',in:'Instable — en cours de connaissance de soi',above:'Instable — en cours de connaissance de soi'},
    wide:{below:'Surestimation — remise en question',in:'Encore approximatif — trop de doute',above:'Bonne intuition — prenez confiance'}
  };
  const color=colors[level][zone];
  return{color,label:labels[level][zone],level,zone};
}

/* ===================== FICHES CATEGORIE C — mode Entrainement + Examen ===================== */
/* ============================================================
   MOTEUR DE CORRECTION INTELLIGENT — Fiches Cat. C / Hors circulation
   ------------------------------------------------------------
   Principe : tolerer les VARIATIONS DE FORME (orthographe, apostrophes,
   articles, fautes de frappe, phonetique, formulations partielles) tout en
   REFUSANT TOUJOURS une valeur reglementaire differente (vitesse, poids,
   dimension, duree, lettre de permis, sigle) et toute inversion de sens
   (Oui/Non, Vrai/Faux). Fonctions generiques, sans duplication.
   ============================================================ */

/* normAns : normalisation canonique "dure".
   - minuscules, sans accents, sans espaces ;
   - apostrophes typographiques (accents) ramenees a l'apostrophe simple ;
   - virgule decimale -> point ; "km/h" == "kmh" ;
   - unites/durees en toutes lettres ramenees a une forme courte
     (heures->h, minutes->min, metres->m, tonnes->t, kilogrammes->kg,
      semaines->sem, pourcent->%) ;
   - pluriel simple tolere (jamais sur une valeur purement numerique).
   AUCUNE valeur numerique n'est jamais transformee en une autre. */
function normAns(s){
  let t=String(s==null?'':s).normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase();
  t=t.replace(/[’‘`´]/g,"'");
  t=t.replace(/,/g,'.').replace(/\s+/g,'');
  const rep=[
    [/heures?/g,'h'],
    [/minutes?/g,'min'],['mn','min'],
    [/metres?/g,'m'],
    [/tonnes?/g,'t'],
    [/kilogrammes?/g,'kg'],[/kilos?/g,'kg'],
    [/pourcent/g,'%'],[/percent/g,'%'],
    [/semaines?/g,'sem']
  ];
  rep.forEach(function(p){var a=p[0],b=p[1];t=(a instanceof RegExp)?t.replace(a,b):t.split(a).join(b);});
  t=t.replace(/\//g,'');
  if(t.length>3 && !/^[0-9.%]+$/.test(t) && t.endsWith('s'))t=t.slice(0,-1);
  return t;
}

/* normLoose : normalisation "souple" (apostrophes retirees + article defini/indefini
   de tete retire) : "l'original"/"original"/"loriginal" -> "original".
   Utilisee uniquement sur des reponses NON sensibles (cf isSensitive). */
function normLoose(s){
  var t=normAns(s).replace(/'/g,'');
  t=t.replace(/^(l|le|la|les|un|une|des|du|de)(?=[a-z0-9])/,'');
  return t;
}

/* isSensitive : true si AUCUNE tolerance floue n'est permise —
   chiffre ou %, reponse binaire de sens (oui/non/vrai/faux), ou token tres
   court assimilable a une lettre de permis / sigle (a, b, c, ce, s...). */
function isSensitive(n){
  if(/[0-9%]/.test(n))return true;
  if(n==='oui'||n==='non'||n==='vrai'||n==='faux')return true;
  if(/^[a-z]{1,3}$/.test(n))return true;
  return false;
}

/* phon : normalisation phonetique francaise simple et reutilisable
   (ph/f, qu/c/k, c doux/s, ss/s, ai/ei/e, au/eau/o, h muet, y, lettres doublees).
   Voie d'acceptation SUPPLEMENTAIRE, jamais exclusive, hors valeurs sensibles. */
function phon(s){
  var t=normLoose(s);
  t=t.replace(/ph/g,'f');
  t=t.replace(/qu/g,'k').replace(/q/g,'k');
  t=t.replace(/c(?=[eiy])/g,'s');
  t=t.replace(/c/g,'k');
  t=t.replace(/eaux?/g,'o').replace(/au/g,'o');
  t=t.replace(/ai|ei/g,'e');
  t=t.replace(/[hy]/g,'');
  t=t.replace(/(.)\1+/g,'$1');
  return t;
}

/* lev : distance de Levenshtein bornee (renvoie 3 si l'ecart de longueur > 2). */
function lev(a,b){
  var m=a.length,n=b.length,i,j;
  if(Math.abs(m-n)>2)return 3;
  var d=[];for(i=0;i<=m;i++){d[i]=[i];}
  for(j=0;j<=n;j++){d[0][j]=j;}
  for(i=1;i<=m;i++)for(j=1;j<=n;j++){
    d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  }
  return d[m][n];
}

/* fcOneMatch : la reponse (pre-normalisee u) correspond-elle a UNE variante a ?
   Cascade du plus strict au plus tolerant ; les valeurs sensibles n'acceptent
   que l'egalite stricte. */
function fcOneMatch(u,a){
  var na=normAns(a);
  if(!u.n)return false;
  if(u.n===na)return true;
  if(isSensitive(na)||isSensitive(u.n))return false;
  var al=normLoose(a);
  if(u.l===al)return true;
  if(al.length>=4 && (u.l.indexOf(al)>-1||al.indexOf(u.l)>-1)){
    var sh=Math.min(u.l.length,al.length),lo=Math.max(u.l.length,al.length);
    if(sh>=4 && sh/lo>=0.5)return true;
  }
  if(u.p===phon(a))return true;
  var tol=al.length>=8?2:1;
  if(lev(u.l,al)<=tol)return true;
  return false;
}

/* fcIsCorrect : accepted = liste de variantes ("ou" natif). Une entree peut etre
   un tableau => TOUS ses elements doivent etre presents dans la reponse ("et"). */
function fcIsCorrect(user,accepted){
  var n=normAns(user);if(!n)return false;
  var u={n:n,l:normLoose(user),p:phon(user)};
  return accepted.some(function(a){
    if(Array.isArray(a))return a.every(function(part){
      return n.indexOf(normAns(part))>-1||u.l.indexOf(normLoose(part))>-1;
    });
    return fcOneMatch(u,a);
  });
}

function fceMaxAccessible(){

function grp(c){return VLC.includes(c||'B')?'VL':'GL';}

/* Correspondance catégorie de profil → module de fiches ETG écrit.
   B, BE (à venir plus tard) et TP CL n'ont pour l'instant accès à aucun module. */
const CAT_MODULE={'C':'C','TP CTRMP':'C','D':'D','TP CTCR':'D','CE':'CE','TP CTRMTV':'CE'};
function moduleForCat(c){return CAT_MODULE[c]||null;}

/* Seuil de déclenchement automatique de la phase de diagnostic (nombre de jours de formation) */
function diagMinJ(stag){return grp(stag.categorie)==='VL'?6:4;}

/* Date de départ du calcul cumulatif : celle enregistrée en base (diag_start),
   ou à défaut, une prévisualisation (jour où le seuil serait atteint) tant qu'elle n'est pas encore persistée. */
function readiness(stag,series){
  const minJ=diagMinJ(stag);
  const active=(series||[]).filter(s=>!s.exclu);
  const jours=[...new Set(active.map(s=>s.date))].sort();
  const start=stag.diag_start||(jours.length>=minJ?jours[minJ-1]:null);
  if(!start)return{level:'gray',label:'Données insuffisantes'};
  const pool=active.filter(s=>s.date>=start).slice().sort((a,b)=>a.date<b.date?-1:(a.date>b.date?1:0));
  if(!pool.length)return{level:'gray',label:'Données insuffisantes'};
  const ests=pool.map(s=>getEstim(s.questions));
  // Moyenne pondérée par ancienneté : la plus vieille série du pool pèse 1, la plus récente pèse N.
  // Rien n'est exclu (toujours cumulatif), mais l'influence des tout premiers jours s'estompe
  // à mesure que de nouvelles séries s'accumulent.
  let wSum=0,wScore=0,wEcart=0;
  pool.forEach((s,i)=>{
    const w=i+1;
    wSum+=w;
    wScore+=s.score*w;
    wEcart+=ests[i].ecart*w;
  });
  const moy=wScore/wSum;
  const ecartMoy=wEcart/wSum;
  const surestime=pool.some((s,i)=>s.score<ests[i].min);
  const surestimeGrave=pool.some((s,i)=>(ests[i].min-s.score)>5);
  if(moy<30||ecartMoy>10||surestimeGrave)return{level:'red',label:'Pas prêt'};
  if(moy>=35&&ecartMoy<=5&&!surestime)return{level:'green',label:'Prêt'};
  return{level:'orange',label:'En progression'};
}

/* Verrouille automatiquement la date de départ du diagnostic dès que le seuil de jours est atteint,
   une seule fois (persisté en base pour rester stable dans le temps). N'écrase jamais un déclenchement déjà fait. */
async function ensureDiagStarted(stag,series){
  if(!stag||stag.diag_start||stag._diagBusy)return;
  const minJ=diagMinJ(stag);
  const active=(series||[]).filter(s=>!s.exclu);
  const jours=[...new Set(active.map(s=>s.date))].sort();
  if(jours.length<minJ)return;
  stag._diagBusy=true;
  const startDate=jours[minJ-1];
  try{
    await api('profiles?id=eq.'+stag.id,{m:'PATCH',b:{diag_start:startDate,diag_trigger:'auto',diag_triggered_at:new Date().toISOString()},pf:'return=minimal'});
    stag.diag_start=startDate;stag.diag_trigger='auto';stag.diag_triggered_at=new Date().toISOString();
  }catch(e){/* réessaiera au prochain affichage */}
  stag._diagBusy=false;
}

/* Déclenchement manuel : utilise tout l'historique déjà disponible (même un seul jour),
   ou démarre à partir d'aujourd'hui si le stagiaire n'a encore aucune série. */
/* Affiche le choix "Débuter le jour même" / "Préciser une date" à la place du bouton (premier déclenchement) */

    +'<button class="btn bg bs" onclick="showDiagDatePicker(\''+id+'\')">Préciser une date</button>'
    +'</div>';
}

/* Affiche un sélecteur de date (plafonné à aujourd'hui) — sert aussi bien au premier
   déclenchement qu'à la correction d'une date déjà fixée (auto ou manuelle). */
function showDiagDatePicker(id){
  const el=document.getElementById('diagChoice');
  if(!el)return;
  const stag=(window._S.stags||[]).find(s=>s.id===id);
  const today=new Date().toISOString().split('T')[0];

async function startDiagManual(id,dateStr){
  const stag=(window._S.stags||[]).find(s=>s.id===id);
  if(!stag)return;
  const today=new Date().toISOString().split('T')[0];
  const startDate=(dateStr&&dateStr<=today)?dateStr:today;
  try{
    await api('profiles?id=eq.'+id,{m:'PATCH',b:{diag_start:startDate,diag_trigger:'manuel',diag_triggered_at:new Date().toISOString()},pf:'return=minimal'});

  return d.toLocaleDateString('fr-FR')+' à '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}

  window._S.stags=st||[];

  if(!st||!st.length){mc.innerHTML='<div class="empty">Aucun stagiaire inscrit</div>';return;}

    +'</div></div>'
    +'<div id="stagList"></div>';

function renderStags(){
  const st=window._S.stags||[];
  const allsr=window._S.allsr||[];
  const grpF=document.getElementById('fgrp')?.value;
  const catF=document.getElementById('fcat2')?.value;
  const deb=document.getElementById('fdeb')?.value;
  const fin=document.getElementById('ffin')?.value;
  const nomF=(document.getElementById('fnom')?.value||'').trim().toLowerCase();
  let list=st;
  if(grpF)list=list.filter(s=>grp(s.categorie)===grpF);
  if(catF)list=list.filter(s=>(s.categorie||'B')===catF);
  if(nomF)list=list.filter(s=>(s.nom||'').toLowerCase().includes(nomF));
  const srAll=allsr.filter(x=>(!deb||x.date>=deb)&&(!fin||x.date<=fin));
  const sr=srAll.filter(x=>!x.exclu);
  const tsr=sr.filter(x=>list.some(l=>l.id===x.stagiaire_id));
  const taux=tsr.length?Math.round(tsr.filter(s=>s.score>=35).length/tsr.length*100):0;
  const joursCumules=list.reduce((tot,s)=>tot+new Set(sr.filter(x=>x.stagiaire_id===s.id).map(x=>x.date)).size,0);
  const moySerJour=joursCumules?(tsr.length/joursCumules).toFixed(1):'0';
  const el=document.getElementById('stagList');
  if(!el)return;
  el.innerHTML='<div style="font-size:11px;color:var(--mu);margin-bottom:8px">Statistiques calculées sur la période sélectionnée</div>'
    +'<div class="sg g3" style="margin-bottom:1rem">'
    +'<div class="sc2"><div class="sv">'+list.length+'</div><div class="sl">stagiaires</div></div>'
    +'<div class="sc2"><div class="sv">'+moySerJour+'</div><div class="sl">séries/jour (moy.)</div></div>'
    +'<div class="sc2"><div class="sv">'+taux+'%</div><div class="sl">réussite</div></div></div>'
    +(list.length?list.map((s)=>{
      const i=st.indexOf(s);
      const ss=sr.filter(x=>x.stagiaire_id===s.id);
      const ssAll=allsr.filter(x=>x.stagiaire_id===s.id&&!x.exclu);
      const last=ss[0];
      const moy=ss.length?(ss.reduce((a,x)=>a+x.score,0)/ss.length).toFixed(1):'—';
      const jrs=[...new Set(ss.map(x=>x.date))].length;
      const rd=readiness(s,ssAll);
      ensureDiagStarted(s,ssAll);
      return '<div class="cd" style="cursor:pointer" onclick="showStag('+i+')">'
        +'<div style="display:flex;align-items:center;gap:8px">'
        +'<div style="flex:1"><div style="font-weight:600;font-size:14px">'+s.nom+'</div>'
        +'<div style="display:flex;gap:6px;margin-top:4px;align-items:center;flex-wrap:wrap"><span class="bk bct">'+(s.categorie||'B')+'</span>'
        +'<span class="ready-badge '+rd.level+'"><span class="dot '+rd.level+'"></span>'+rd.label+'</span>'
        +'<span style="font-size:11px;color:var(--mu)">'+jrs+' jour'+(jrs>1?'s':'')+' · moy '+moy+'</span></div></div>'
        +(last?'<span class="bk '+(last.score>=35?'bok':'bko')+'">'+last.score+'/40</span>':'')
        +'</div></div>';
    }).join(''):'<div class="empty">Aucun stagiaire dans ce filtre</div>');
}
