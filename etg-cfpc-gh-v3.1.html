async function showStag(i){
  if(window._S.curStagIdx!==i)window._S.stagSubTab='code';
  const stag=window._S.stags[i];
  window._S.curStagIdx=i;
  const sr=window._S.allsr||[];
  const series=sr.filter(s=>s.stagiaire_id===stag.id);
  const active=series.filter(s=>!s.exclu);
  window._S.curSeries=series;
  const obj=grp(stag.categorie)==='VL'?{min:10,max:20}:{min:8,max:10};
  const jours=[...new Set(active.map(s=>s.date))].length;
  const pct=Math.min(100,Math.round(jours/obj.min*100));
  const moy=active.length?(active.reduce((a,s)=>a+s.score,0)/active.length).toFixed(1):'—';
  const serJour=active.length&&jours?(active.length/jours).toFixed(1):'0';
  const rd=readiness(stag,active);
  ensureDiagStarted(stag,active);
  const diagBlock='<div id="diagChoice" style="margin:2px 0 12px">'
    +(stag.diag_start
      ?'<div style="font-size:11px;color:var(--mu)">&#128203; Diagnostic '+(stag.diag_trigger==='manuel'?'déclenché manuellement':'démarré automatiquement')+' le '+fmtDT(stag.diag_triggered_at)
        +' · <a href="#" onclick="showDiagDatePicker(\''+stag.id+'\');return false" style="color:var(--b)">modifier la date</a>'
        +(stag.diag_trigger==='manuel'?' · <a href="#" onclick="revertDiag(\''+stag.id+'\');return false" style="color:var(--b)">&#8630; revenir à l\'automatique</a>':'')
        +'</div>'
      :'<button class="btn bp bs" onclick="toggleDiagChoice(\''+stag.id+'\')">&#127919; Démarrer la phase de diagnostic</button>')
    +'</div>';
  let ex=[];
  try{ex=await api('etg_resultats?stagiaire_id=eq.'+stag.id+'&order=date.desc&select=*')||[];}catch(e){}
  window._S.curEx=ex;
  const exEtg=ex.filter(function(e){return !e.module||e.module==='etg';});
  const exHC=ex.filter(function(e){return e.module==='hors_circulation';});
  const exCirc=ex.filter(function(e){return e.module==='circulation';});
  let avisRows=[];try{avisRows=await api('avis_stagiaire?stagiaire_id=eq.'+stag.id+'&select=*')||[];}catch(e){}
  const avisBy=function(m){return avisRows.find(function(a){return (a.module||'etg')===m;})||null;};
  window._S.curExEtg=exEtg;
  window._S.curAvisEtg=avisBy('etg');
  let fcBlock='';
  if(moduleForCat(stag.categorie)==='C'){
    let fcProg=null,fcLock=null;
    try{
      const[pr,lr]=await Promise.all([
        api('progression_fiches?stagiaire_id=eq.'+stag.id+'&categorie=eq.C&select=*'),
        api('fiches_deverrouillage?stagiaire_id=eq.'+stag.id+'&categorie=eq.C&select=*')
      ]);
      fcProg=(pr&&pr[0])||null;fcLock=(lr&&lr[0])||null;
    }catch(e){}
    window._S.curFCLock=fcLock;
    const validees=(fcProg&&fcProg.fiches_validees)||[];
    fcBlock='<div class="cd"><div class="cdt">&#128994; Fiches C — '+validees.length+'/20 acquises</div>'
      +(fcProg&&fcProg.derniere_fiche?'<p style="font-size:12px;color:var(--mu);margin-bottom:6px">Derni&egrave;re fiche travaill&eacute;e : '+fcProg.derniere_fiche+' ('+(fcProg.dernier_score!=null?fcProg.dernier_score+'/10':'—')+')</p>':'<p style="font-size:12px;color:var(--mu);margin-bottom:6px">Aucune fiche commenc&eacute;e</p>')
      +(fcLock&&fcLock.fiche_deverrouillee?'<p style="font-size:11px;color:var(--mu)">&#128273; D&eacute;verrouill&eacute; jusqu\'&agrave; la fiche '+fcLock.fiche_deverrouillee+' le '+fmtDT(fcLock.deverrouille_at)+'</p>':'')
      +'<div style="font-size:12px;color:var(--mu);margin-top:6px">D&eacute;verrouillage manuel :</div>'
      +fcLockChoiceHtml(stag.id)
      +'</div>'
      +'<div class="cd"><div class="cdt">Historique des tentatives</div>'
      +fcHistRows(fcProg&&fcProg.historique)
      +'</div>';
  }
  let fdBlock='';
  if(moduleForCat(stag.categorie)==='D'){
    let fdProg=null,fdLock=null;
    try{
      const[pr,lr]=await Promise.all([
        api('progression_fiches?stagiaire_id=eq.'+stag.id+'&categorie=eq.D&select=*'),
        api('fiches_deverrouillage?stagiaire_id=eq.'+stag.id+'&categorie=eq.D&select=*')
      ]);
      fdProg=(pr&&pr[0])||null;fdLock=(lr&&lr[0])||null;
    }catch(e){}
    window._S.curFDLock=fdLock;
    const valideesD=(fdProg&&fdProg.fiches_validees)||[];
    fdBlock='<div class="cd"><div class="cdt">&#128994; Fiches D — '+valideesD.length+'/20 acquises</div>'
      +(fdProg&&fdProg.derniere_fiche?'<p style="font-size:12px;color:var(--mu);margin-bottom:6px">Derni&egrave;re fiche travaill&eacute;e : '+fdProg.derniere_fiche+' ('+(fdProg.dernier_score!=null?fdProg.dernier_score+'/10':'—')+')</p>':'<p style="font-size:12px;color:var(--mu);margin-bottom:6px">Aucune fiche commenc&eacute;e</p>')
      +(fdLock&&fdLock.fiche_deverrouillee?'<p style="font-size:11px;color:var(--mu)">&#128273; D&eacute;verrouill&eacute; jusqu\'&agrave; la fiche '+fdLock.fiche_deverrouillee+' le '+fmtDT(fdLock.deverrouille_at)+'</p>':'')
      +'<div style="font-size:12px;color:var(--mu);margin-top:6px">D&eacute;verrouillage manuel :</div>'
      +fdLockChoiceHtml(stag.id)
      +'</div>';
  }
  let fceBlock='';
  if(moduleForCat(stag.categorie)==='CE'){
    let fceProg=null,fceLock=null;
    try{
      const[pr,lr]=await Promise.all([
        api('progression_fiches?stagiaire_id=eq.'+stag.id+'&categorie=eq.CE&select=*'),
        api('fiches_deverrouillage?stagiaire_id=eq.'+stag.id+'&categorie=eq.CE&select=*')
      ]);
      fceProg=(pr&&pr[0])||null;fceLock=(lr&&lr[0])||null;
    }catch(e){}
    window._S.curFCELock=fceLock;
    const valideesCE=(fceProg&&fceProg.fiches_validees)||[];
    fceBlock='<div class="cd"><div class="cdt">&#128994; Fiches CE — '+valideesCE.length+'/20 acquises</div>'
      +(fceProg&&fceProg.derniere_fiche?'<p style="font-size:12px;color:var(--mu);margin-bottom:6px">Derni&egrave;re fiche travaill&eacute;e : '+fceProg.derniere_fiche+' ('+(fceProg.dernier_score!=null?fceProg.dernier_score+'/10':'—')+')</p>':'<p style="font-size:12px;color:var(--mu);margin-bottom:6px">Aucune fiche commenc&eacute;e</p>')
      +(fceLock&&fceLock.fiche_deverrouillee?'<p style="font-size:11px;color:var(--mu)">&#128273; D&eacute;verrouill&eacute; jusqu\'&agrave; la fiche '+fceLock.fiche_deverrouillee+' le '+fmtDT(fceLock.deverrouille_at)+'</p>':'')
      +'<div style="font-size:12px;color:var(--mu);margin-top:6px">D&eacute;verrouillage manuel :</div>'
      +fceLockChoiceHtml(stag.id)
      +'</div>';
  }
  const asc=[...active].reverse();
  const fcModule=moduleForCat(stag.categorie);
  const hcBlock=fcModule==='C'?(moduleResultCard('Hors circulation',exHC,17,27)+avisSummary(avisBy('hors_circulation'))):'';
  const fichesBlock=fcBlock+fdBlock+fceBlock+hcBlock;
  window._S.stagSubTab=window._S.stagSubTab||'code';
  const isGL3=fcModule==='C';
  const fichesSub=isGL3?'hc':'fiches';
  const subTabs=fcModule?(isGL3?('<div class="rw" style="margin-bottom:10px">'
    +'<button class="btn '+(window._S.stagSubTab==='code'?'bp':'bg')+' bs" style="flex:1" onclick="stagSubTab(\'code\')">ETG</button>'
    +'<button class="btn '+(window._S.stagSubTab==='hc'?'bp':'bg')+' bs" style="flex:1" onclick="stagSubTab(\'hc\')">Hors circ.</button>'
    +'<button class="btn '+(window._S.stagSubTab==='circ'?'bp':'bg')+' bs" style="flex:1" onclick="stagSubTab(\'circ\')">Circulation</button>'
    +'</div>'):('<div class="rw" style="margin-bottom:10px">'
    +'<button class="btn '+(window._S.stagSubTab==='code'?'bp':'bg')+' bs" style="flex:1" onclick="stagSubTab(\'code\')">Code</button>'
    +'<button class="btn '+(window._S.stagSubTab==='fiches'?'bp':'bg')+' bs" style="flex:1" onclick="stagSubTab(\'fiches\')">Fiches &eacute;crites</button>'
    +'</div>')):'';
  document.getElementById('mc').innerHTML=
    '<button class="btn bg bs" onclick="fTab(\'s\',document.querySelectorAll(\'#ftb .ti\')[0])" style="margin-bottom:12px">← Retour</button>'
    +'<h2 class="pt">'+stag.nom+'</h2>'
    +'<div style="display:flex;gap:6px;align-items:center;margin-bottom:4px;flex-wrap:wrap">'
    +'<span class="bk bct">'+(stag.categorie||'B')+' · '+grp(stag.categorie)+'</span>'
    +'<span class="ready-badge '+rd.level+'"><span class="dot '+rd.level+'"></span>'+rd.label+'</span></div>'
    +'<p style="font-size:12px;color:var(--mu);margin:4px 0 12px">'+stag.email+'</p>'
    +subTabs
    +'<div id="stagCodeTab"'+(window._S.stagSubTab==='code'?'':' class="H"')+'>'
    +diagBlock
    +'<div class="cd"><div style="font-size:12px;color:var(--mu);margin-bottom:4px">Progression ('+jours+'/'+obj.min+' jours min · '+obj.max+' max)</div>'
    +'<div class="pb"><div class="pf" style="width:'+pct+'%"></div></div></div>'
    +'<div class="sg g2" style="margin-bottom:1rem">'
    +'<div class="sc2"><div class="sv">'+serJour+'</div><div class="sl">séries/jour (moy.)</div></div>'
    +'<div class="sc2"><div class="sv">'+moy+'</div><div class="sl">score moyen</div></div>'
    +'<div class="sc2"><div class="sv">'+active.filter(s=>s.score>=35).length+'</div><div class="sl">réussies</div></div>'
    +'<div class="sc2"><div class="sv">'+Math.round(active.filter(s=>s.score>=35).length/Math.max(1,active.length)*100)+'%</div><div class="sl">taux réussite</div></div></div>'
    +(asc.length>1?'<div class="cd"><div class="cdt">Performance (seuil de réussite : 35–40/40)</div><div class="cw"><canvas id="cPerfF"></canvas></div></div>'
      +'<div class="cd"><div class="cdt">Fiabilité (croyance vs réalité)</div><div class="cw"><canvas id="cFiabF"></canvas></div></div>':'')
    +'<div class="cd"><div class="cdt">&#127891; Examen ETG officiel</div>'
    +'<div id="exResList">'+exResRows(exEtg)+'</div>'+avisSummary(window._S.curAvisEtg)
    +'<button class="btn bp bs mt" onclick="genPDF(window._S.stags['+i+'],window._S.curActive,window._S.curExEtg,window._S.curAvisEtg)" style="width:100%">&#128196; Télécharger le récapitulatif (PDF)</button>'
    +'</div>'
    +'<h3 style="margin-bottom:.5rem">Historique</h3>'
    +'<div class="cd" style="padding:.5rem .75rem">'
    +(series.length?series.map((s,idx)=>{const a=getA(s.questions);return '<div class="hl"'+(s.exclu?' style="opacity:.5"':'')+' onclick="showCSerie('+idx+')">'
      +'<div class="hli"><div class="hld">'+s.date+' · DVD '+(s.dvd||'?')+' · Sér. '+(s.serie||'?')+'</div>'
      +'<div class="hlm">'+(s.exclu?'&#128683; Neutralisée — exclue des statistiques':'&#9888;'+a.ve+' vraie(s) erreur(s) · &#10003;'+a.ac+' acquis')+'</div></div>'
      +'<span class="bk '+(s.score>=35?'bok':'bko')+'">'+s.score+'/40</span></div>';}).join('')
      :'<div class="empty" style="padding:1rem">Aucune série</div>')
    +'</div>'
    +'</div>'
    +'<div id="stagFichesTab"'+(window._S.stagSubTab===fichesSub?'':' class="H"')+'>'+(fichesBlock||'<p style="font-size:12px;color:var(--mu)">Aucun module de fiches &eacute;crites pour cette cat&eacute;gorie.</p>')+'</div>'+(isGL3?('<div id="stagCircTab"'+(window._S.stagSubTab==='circ'?'':' class="H"')+'>'+moduleResultCard('Circulation',exCirc,20,31)+avisSummary(avisBy('circulation'))+'</div>'):'');
  window._S.curActive=active;
  if(asc.length>1){
    const labs=asc.map(s=>s.date);
    const scores=asc.map(s=>s.score);
    const ests=asc.map(s=>getEstim(s.questions));
    const mins=ests.map(e=>e.min),maxs=ests.map(e=>e.max);
    const ptColors=asc.map((s,idx)=>{
      const eb=estimBadge(s.score,ests[idx].min,ests[idx].max,ests[idx].ecart);
      return eb.color==='ok'?'#2A9D5C':(eb.color==='ko'?'#D64545':'#E8A33D');
    });
    const perfColors=scores.map(sc=>sc>=35?'#2A9D5C':(sc>=30?'#E8A33D':'#D64545'));
    if(CHT2)CHT2.destroy();if(CHT3)CHT3.destroy();
    const c1=document.getElementById('cPerfF');
    if(c1&&typeof Chart!=='undefined')CHT2=new Chart(c1,{type:'line',data:{labels:labs,datasets:[
      {label:'Score',data:scores,borderColor:'#1B3A6B',backgroundColor:'rgba(27,58,107,.08)',tension:.25,fill:true,pointBackgroundColor:perfColors,pointRadius:5,pointBorderColor:perfColors},
      {label:'Seuil 35/40',data:labs.map(()=>35),borderColor:'#2A9D5C',borderDash:[5,4],pointRadius:0,fill:false}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:40,ticks:{stepSize:10}},x:{ticks:{maxTicksLimit:6,maxRotation:0}}}}});
    const c2=document.getElementById('cFiabF');
    if(c2&&typeof Chart!=='undefined')CHT3=new Chart(c2,{type:'line',data:{labels:labs,datasets:[
      {label:'Estimation min',data:mins,borderColor:'transparent',pointRadius:0,fill:false},
      {label:'Estimation max',data:maxs,borderColor:'transparent',backgroundColor:'rgba(108,180,232,.22)',pointRadius:0,fill:'-1'},
      {label:'Résultat réel',data:scores,borderColor:'#1B3A6B',borderWidth:1.5,tension:.25,fill:false,pointBackgroundColor:ptColors,pointBorderColor:ptColors,pointRadius:5}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:40,ticks:{stepSize:10}},x:{ticks:{maxTicksLimit:6,maxRotation:0}}}}});
  }
}
function showCSerie(i){window._anaFrom={type:'formateur',stagIdx:window._S.curStagIdx};rAna(window._S.curSeries[i]);}

async function rStatsA(){
  const mc=document.getElementById('mc');
  const today=new Date().toISOString().split('T')[0];
  const ms=today.substring(0,7)+'-01';
  mc.innerHTML='<h2 class="pt">Statistiques</h2>'
    +'<div class="cd"><div class="fb">'
    +'<select id="fgrp2"><option value="">Tous groupes</option><option value="VL">VL (véh. léger)</option><option value="GL">GL (groupe lourd)</option></select>'
    +'<select id="fc"><option value="">Toutes catégories</option>'+CATS.map(c=>'<option>'+c+'</option>').join('')+'</select>'
    +'</div><div class="fb">'
    +'<input type="date" id="ff" value="'+ms+'">'
    +'<input type="date" id="ft2" value="'+today+'">'
    +'</div><button class="btn bp bs" onclick="loadSt()" style="width:100%">Filtrer</button></div>'
    +'<div id="sr2"></div>';
  loadSt();
}

async function loadSt(){
  const grpF=document.getElementById('fgrp2')?.value;
  const cat=document.getElementById('fc')?.value;
  const from=document.getElementById('ff')?.value;
  const to=document.getElementById('ft2')?.value;
  const el=document.getElementById('sr2');
  if(!el)return;
  el.innerHTML='<div class="empty">Chargement...</div>';
  let pq='profiles?role=eq.stagiaire&select=*';
  if(cat)pq+='&categorie=eq.'+encodeURIComponent(cat);
  let prs=await api(pq);
  if(grpF)prs=(prs||[]).filter(p=>grp(p.categorie)===grpF);
  const ids=(prs||[]).map(p=>p.id);
  if(!ids.length){el.innerHTML='<div class="empty">Aucun stagiaire trouvé</div>';return;}
  let sq='series?select=*&order=date.asc&stagiaire_id=in.('+ids.join(',')+')';
  if(from)sq+='&date=gte.'+from;
  if(to)sq+='&date=lte.'+to;
  const sr=(await api(sq)||[]).filter(s=>!s.exclu);
  if(!sr||!sr.length){el.innerHTML='<div class="empty">Aucune série sur cette période</div>';return;}
  const taux=Math.round(sr.filter(s=>s.score>=35).length/sr.length*100);
  const moy=(sr.reduce((a,s)=>a+s.score,0)/sr.length).toFixed(1);
  const joursCumules=(prs||[]).reduce((tot,p)=>tot+new Set(sr.filter(x=>x.stagiaire_id===p.id).map(x=>x.date)).size,0);
  const serJourG=joursCumules?(sr.length/joursCumules).toFixed(1):'0';
  const byD={};
  sr.forEach(s=>{
    if(!byD[s.date])byD[s.date]={scores:[],mins:[],maxs:[]};
    byD[s.date].scores.push(s.score);
    const e=getEstim(s.questions);
    byD[s.date].mins.push(e.min);byD[s.date].maxs.push(e.max);
  });
  const labs=Object.keys(byD).sort();
  const movs=labs.map(d=>(byD[d].scores.reduce((a,b)=>a+b,0)/byD[d].scores.length).toFixed(1));
  const minsAvg=labs.map(d=>byD[d].mins.reduce((a,b)=>a+b,0)/byD[d].mins.length);
  const maxsAvg=labs.map(d=>byD[d].maxs.reduce((a,b)=>a+b,0)/byD[d].maxs.length);
  const perfColors=movs.map(v=>parseFloat(v)>=35?'#2A9D5C':(parseFloat(v)>=30?'#E8A33D':'#D64545'));
  const fiabColors=labs.map((d,idx)=>{
    const sc=parseFloat(movs[idx]);
    const eb=estimBadge(sc,minsAvg[idx],maxsAvg[idx],maxsAvg[idx]-minsAvg[idx]);
    return eb.color==='ok'?'#2A9D5C':(eb.color==='ko'?'#D64545':'#E8A33D');
  });
  const catS=CATS.map(c=>{
    const cs=sr.filter(s=>(prs||[]).find(p=>p.id===s.stagiaire_id&&p.categorie===c));
    if(!cs.length)return'';
    const cm=(cs.reduce((a,s)=>a+s.score,0)/cs.length).toFixed(1);
    const ct=Math.round(cs.filter(s=>s.score>=35).length/cs.length*100);
    const catStagIds=(prs||[]).filter(p=>p.categorie===c).map(p=>p.id);
    const catJours=catStagIds.reduce((tot,id)=>tot+new Set(cs.filter(x=>x.stagiaire_id===id).map(x=>x.date)).size,0);
    const catSerJour=catJours?(cs.length/catJours).toFixed(1):'0';
    return '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd)">'
      +'<span class="bk bct" style="min-width:70px;text-align:center">'+c+'</span>'
      +'<span style="flex:1;font-size:12px;color:var(--mu)">'+catSerJour+' séries/jour (moy.)</span>'
      +'<span style="font-size:13px;font-weight:600">'+cm+'/40</span>'
      +'<span class="bk '+(ct>=70?'bok':'bko')+'">'+ct+'%</span></div>';
  }).join('');
  el.innerHTML='<div class="sg g2" style="margin-bottom:1rem">'
    +'<div class="sc2"><div class="sv">'+(prs||[]).length+'</div><div class="sl">stagiaires</div></div>'
    +'<div class="sc2"><div class="sv">'+serJourG+'</div><div class="sl">séries/jour (moy.)</div></div>'
    +'<div class="sc2"><div class="sv">'+moy+'</div><div class="sl">score moyen /40</div></div>'
    +'<div class="sc2"><div class="sv">'+taux+'%</div><div class="sl">taux de réussite</div></div></div>'
    +'<div class="cd"><div class="cdt">Performance — évolution du score moyen (seuil 35/40)</div><div class="cw"><canvas id="cev"></canvas></div></div>'
    +(labs.length>1?'<div class="cd"><div class="cdt">Fiabilité globale (croyance vs réalité)</div><div class="cw"><canvas id="cFiabG"></canvas></div>'
      +'<div style="font-size:10px;color:var(--mu);margin-top:8px">Bande = estimation moyenne du groupe [min–max]. Point = score réel moyen.</div></div>'
      +'<div class="cd"><div class="cdt">Synthèse — Performance × Fiabilité</div><div class="cw"><canvas id="cSynth"></canvas></div>'
      +'<div style="font-size:10px;color:var(--mu);margin-top:8px">Quand la performance (ligne pleine) reste dans une bande de croyance étroite et exacte, le groupe est compétent.</div></div>':'')
    +(cat?'':'<div class="cd"><div class="cdt">Par catégorie</div>'+catS+'</div>');
  if(CHT)CHT.destroy();if(CHT2)CHT2.destroy();if(CHT3)CHT3.destroy();
  const ctx=document.getElementById('cev');
  if(ctx&&labs.length>=1&&typeof Chart!=='undefined'){
    CHT=new Chart(ctx,{type:'line',data:{labels:labs,datasets:[
      {label:'Score moyen',data:movs,borderColor:'#1B3A6B',backgroundColor:'rgba(27,58,107,.1)',tension:0.3,fill:true,pointBackgroundColor:perfColors,pointRadius:5},
      {label:'Seuil 35/40',data:labs.map(()=>35),borderColor:'#2A9D5C',borderDash:[5,4],pointRadius:0,fill:false}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:40,ticks:{stepSize:10}},x:{ticks:{maxTicksLimit:6,maxRotation:0}}}}});
  }
  if(labs.length>1){
    const c2=document.getElementById('cFiabG');
    if(c2&&typeof Chart!=='undefined')CHT2=new Chart(c2,{type:'line',data:{labels:labs,datasets:[
      {label:'Estimation min',data:minsAvg,borderColor:'transparent',pointRadius:0,fill:false},
      {label:'Estimation max',data:maxsAvg,borderColor:'transparent',backgroundColor:'rgba(108,180,232,.22)',pointRadius:0,fill:'-1'},
      {label:'Score réel moyen',data:movs,borderColor:'#1B3A6B',borderWidth:1.5,tension:.25,fill:false,pointBackgroundColor:fiabColors,pointBorderColor:fiabColors,pointRadius:5}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:40,ticks:{stepSize:10}},x:{ticks:{maxTicksLimit:6,maxRotation:0}}}}});
    const c3=document.getElementById('cSynth');
    if(c3&&typeof Chart!=='undefined')CHT3=new Chart(c3,{type:'line',data:{labels:labs,datasets:[
      {label:'Estimation min',data:minsAvg,borderColor:'transparent',pointRadius:0,fill:false},
      {label:'Estimation max',data:maxsAvg,borderColor:'transparent',backgroundColor:'rgba(108,180,232,.18)',pointRadius:0,fill:'-1'},
      {label:'Performance',data:movs,borderColor:'#1B3A6B',borderWidth:2,tension:.25,fill:false,pointBackgroundColor:perfColors,pointBorderColor:perfColors,pointRadius:5},
      {label:'Seuil 35/40',data:labs.map(()=>35),borderColor:'#2A9D5C',borderDash:[5,4],pointRadius:0,fill:false}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:40,ticks:{stepSize:10}},x:{ticks:{maxTicksLimit:6,maxRotation:0}}}}});
  }
}
</script>
