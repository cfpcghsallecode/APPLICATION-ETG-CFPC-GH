<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Suivi ETG — Georges Hoareau</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--b:#1B3A6B;--c:#6CB4E8;--bg:#F7F8FA;--sf:#fff;--bd:#E5E5E5;--ok:#2A9D5C;--okb:#E8F7EF;--ko:#D64545;--kob:#FCEBEB;--wa:#E8A33D;--wab:#FCF3E3;--mu:#888;--r:10px;--f:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
body{font-family:var(--f);background:var(--bg);color:#1a1a1a;font-size:14px;min-height:100vh}
.H{display:none!important}
.aw{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem 1.25rem}
.al{max-width:220px;margin-bottom:1.5rem}
.ac{width:100%;max-width:360px;background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:1.5rem}
.ac h2{font-size:18px;font-weight:700;color:var(--b);margin-bottom:1.25rem}
.lr{display:flex;gap:10px;justify-content:center;margin-top:1.5rem}
.lr img{height:42px;object-fit:contain}
.fi{margin-bottom:13px}
.fi label{display:block;font-size:12px;color:#555;margin-bottom:5px;font-weight:500}
.fi input,.fi select{width:100%;padding:11px 12px;border-radius:var(--r);border:1px solid var(--bd);font-size:14px;font-family:var(--f);background:var(--sf);color:#1a1a1a;-webkit-appearance:none}
.fi input:focus,.fi select:focus{outline:none;border-color:var(--c);box-shadow:0 0 0 3px rgba(108,180,232,.2)}
.btn{width:100%;padding:12px;border-radius:var(--r);border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--f)}
.bp{background:var(--b);color:#fff}
.ba{background:var(--c);color:var(--b)}
.bg{background:none;border:1px solid var(--bd);color:#555}
.bs{width:auto;padding:7px 14px;font-size:12px;font-weight:500}
.lk{background:none;border:none;color:var(--b);font-size:13px;cursor:pointer;text-decoration:underline;font-family:var(--f);padding:6px 0;display:block;text-align:center;margin-top:10px}
.em{color:var(--ko);font-size:12px;margin-top:8px}
.as{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}
.as.wd{max-width:760px}
.hd{background:var(--b);color:#fff;padding:.9rem 1.25rem;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:20}
.hd img{height:26px}
.hi2{flex:1}
.ht{font-size:14px;font-weight:600}
.hs{font-size:11px;opacity:.75;margin-top:1px}
.hb{background:none;border:none;color:#fff;cursor:pointer;padding:6px;font-size:18px}
.ct{flex:1;padding:1.25rem;padding-bottom:5.5rem}
.tb{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:var(--sf);border-top:1px solid var(--bd);display:flex;z-index:20}
.tb.wd{max-width:760px}
.ti{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0 6px;color:var(--mu);font-size:10px;font-family:var(--f);cursor:pointer}
.ti.ac2{color:var(--b);font-weight:600}
.ti span{font-size:20px}
.cd{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:1rem 1.1rem;margin-bottom:.75rem}
.cdt{font-size:14px;font-weight:600;color:var(--b);margin-bottom:.75rem}
.bk{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600}
.bok{background:var(--okb);color:var(--ok)}
.bko{background:var(--kob);color:var(--ko)}
.bct{background:#E6F1FB;color:#185FA5}
.sg{display:grid;gap:10px;margin-bottom:1rem}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:repeat(3,1fr)}
.sc2{background:var(--bg);border-radius:var(--r);padding:11px;text-align:center}
.sv{font-size:22px;font-weight:700;color:var(--b)}
.sl{font-size:11px;color:var(--mu);margin-top:2px}
.pb{height:6px;border-radius:3px;background:var(--bd);overflow:hidden;margin-top:5px}
.pf{height:100%;border-radius:3px;background:var(--c);transition:width .3s}
.qr{display:grid;grid-template-columns:26px 1fr 1fr;gap:6px;align-items:center;padding:7px 0;border-bottom:1px solid var(--bd)}
.qr:last-child{border-bottom:none}
.qn{font-size:11px;color:var(--mu);text-align:center;font-weight:600}
.sg2{display:flex;border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.sg2 button{flex:1;padding:8px 2px;font-size:12px;background:var(--sf);border:none;border-right:1px solid var(--bd);cursor:pointer;font-family:var(--f);color:#555}
.sg2 button:last-child{border-right:none}
.sg2 button.sl2{background:var(--b);color:#fff;font-weight:600}
.cr{display:grid;grid-template-columns:26px 1fr 1fr 1fr;gap:6px;align-items:center;padding:7px 0;border-bottom:1px solid var(--bd)}
.cr:last-child{border-bottom:none}
.rb{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;font-size:13px;font-weight:700;margin:0 auto}
.rok{background:var(--okb);border:2.5px solid var(--ok);color:var(--ok)}
.rko{background:var(--kob);border:2.5px solid var(--ko);color:var(--ko)}
.es{display:flex;gap:4px}
.es button{flex:1;padding:6px 2px;font-size:13px;background:var(--sf);border:1px solid var(--bd);border-radius:6px;cursor:pointer}
.es button.s1{background:var(--kob);border-color:var(--ko)}
.es button.s2{background:var(--wab);border-color:var(--wa)}
.es button.s3{background:#E6F1FB;border-color:#378ADD}
.fb{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.fb select,.fb input{flex:1;min-width:110px;padding:8px 10px;border-radius:var(--r);border:1px solid var(--bd);font-size:13px;font-family:var(--f)}
.hl{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--bd);cursor:pointer}
.hl:last-child{border-bottom:none}
.hli{flex:1}
.hld{font-size:13px;font-weight:600}
.hlm{font-size:11px;color:var(--mu);margin-top:2px}
.bli{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--kob);border-radius:6px;margin-bottom:4px;font-size:12px}
.cw{position:relative;height:180px;margin-top:10px}
.empty{text-align:center;color:var(--mu);padding:2.5rem 1rem;font-size:13px}
.ph{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;background:#E6F1FB;color:#185FA5;margin-bottom:12px}
.rw{display:flex;gap:8px;align-items:center}
.mt{margin-top:12px}
.pt{font-size:16px;font-weight:700;color:var(--b);margin-bottom:1rem}
</style>
</head>

<script>
const SU='https://hdijwrekfvbsuqmzrgpz.supabase.co',SK='sb_publishable_alCS99Uw2DHX5Edo71ZqAA_WPdsCaS5',CATS=["B", "BE", "C", "CE", "D", "TP CTCR", "TP CTRMP", "TP CTRMTV", "TP CL"];
let CU=null,CP=null,GD=null,CHT=null;
window._S={};  // Store global pour éviter les problèmes de serialisation inline

async function api(p,o){
  const h={'apikey':SK,'Content-Type':'application/json','Prefer':(o&&o.pf)||'return=representation'};
  h['Authorization']='Bearer '+(CU?CU.access_token:SK);
  const r=await fetch(SU+'/rest/v1/'+p,{method:(o&&o.m)||'GET',headers:h,body:(o&&o.b)?JSON.stringify(o.b):undefined});
  if(!r.ok){const e=await r.json();throw new Error(e.message||'Erreur');}
  const t=await r.text();return t?JSON.parse(t):null;
}
async function sauth(a,b){
  const r=await fetch(SU+'/auth/v1/'+a,{method:'POST',headers:{'apikey':SK,'Content-Type':'application/json'},body:JSON.stringify(b)});
  return r.json();
}

function sw(m){
  document.getElementById('afl').classList.toggle('H',m!=='l');
  document.getElementById('afs').classList.toggle('H',m!=='s');
  document.getElementById('atit').textContent=m==='l'?'Connexion':"Créer mon compte";
}

async function doLogin(){
  const e=document.getElementById('le').value.trim(),p=document.getElementById('lp').value;
  const el=document.getElementById('le2');el.classList.add('H');
  if(!e||!p){showE(el,'Remplissez tous les champs');return;}
  const d=await sauth('token?grant_type=password',{email:e,password:p});
  if(d.error){showE(el,tr(d.error_description||d.error));return;}
  CU=d;await loadP();
}

async function doSignup(){
  const n=document.getElementById('rn').value.trim(),e=document.getElementById('re').value.trim();
  const p=document.getElementById('rp').value,c=document.getElementById('rc').value;
  const el=document.getElementById('re2');el.classList.add('H');
  if(!n||!e||!p||!c){showE(el,'Remplissez tous les champs');return;}
  if(p.length<6){showE(el,'Mot de passe trop court (6 min)');return;}
  
  const d=await sauth('signup',{email:e,password:p,data:{nom:n,categorie:c}});
  if(d.error){showE(el,tr(d.error_description||d.error));return;}
  
  // Correction pour la validation par e-mail Supabase
  if(!d.access_token && (d.user || d.id)) {
    showE(el, 'Inscription réussie ! Vérifiez vos e-mails pour confirmer votre compte, puis connectez-vous.');
    setTimeout(() => sw('l'), 4000);
    return;
  }

  CU=d;await loadP();
}
async function loadP(){
  try{
    const ps=await api('profiles?id=eq.'+CU.user.id+'&select=*');
    if(ps&&ps.length){CP=ps[0];}
    else{
      const m=CU.user.user_metadata||{};
      CP={id:CU.user.id,nom:m.nom||'Utilisateur',email:CU.user.email,categorie:m.categorie||'B',role:'stagiaire'};
      await api('profiles',{m:'POST',b:CP});
      const fr=await api('profiles?id=eq.'+CU.user.id+'&select=*');
      if(fr&&fr.length)CP=fr[0];
    }
    showApp();
  }catch(e){console.error(e);}
}

async function doLogout(){
  await fetch(SU+'/auth/v1/logout',{method:'POST',headers:{'apikey':SK,'Authorization':'Bearer '+CU.access_token}});
  CU=null;CP=null;
  document.getElementById('sap').classList.add('H');
  document.getElementById('sa').classList.remove('H');
  sw('l');
}

function showE(el,m){el.textContent=m;el.classList.remove('H');}
function tr(m){
  if(!m)return'Erreur';
  if(m.includes('Invalid login'))return'Email ou mot de passe incorrect';
  if(m.includes('already registered'))return'Email déjà utilisé';
  if(m.includes('Password'))return'Mot de passe trop court (6 min)';
  return m;
}

function showApp(){
  document.getElementById('sa').classList.add('H');
  document.getElementById('sap').classList.remove('H');
  if(CP.role==='formateur'){
    document.getElementById('aht').textContent='Espace Formateur';
    document.getElementById('ahs').textContent=CP.nom;
    document.getElementById('ftb').classList.remove('H');
    document.getElementById('sap').classList.add('wd');
    form('s',document.querySelector('#ftb .ti'));
  }else{
    document.getElementById('aht').textContent='Mon suivi ETG';
    document.getElementById('ahs').textContent=CP.nom+' · '+CP.categorie;
    document.getElementById('stb').classList.remove('H');
    stag('a',document.querySelector('#stb .ti'));
  }
}

// ── STAGIAIRE ──────────────────────────────────────────────────
function stag(t,el){
  document.querySelectorAll('#stb .ti').forEach(x=>x.classList.remove('ac2'));
  if(el)el.classList.add('ac2');
  if(t==='a')rAcc();
  else if(t==='g')rGM();
  else if(t==='h')rHisto();
}

async function rAcc(){
  const mc=document.getElementById('mc');
  mc.innerHTML='<div class="empty">Chargement...</div>';
  const sr=await api('series?stagiaire_id=eq.'+CP.id+'&order=created_at.desc&select=*');
  const isN=CP.categorie==='B';
  const obj=isN?{min:10,max:20}:{min:8,max:10};
  const jours=[...new Set((sr||[]).map(s=>s.date))].length;
  const pct=Math.min(100,Math.round(jours/obj.min*100));
  const moy=(sr||[]).length?(sr.reduce((a,s)=>a+s.score,0)/sr.length).toFixed(1):'—';
  const taux=(sr||[]).length?Math.round(sr.filter(s=>s.score>=35).length/sr.length*100):0;
  const last=(sr||[])[0];
  const pnom=CP.nom.split(' ')[0];
  mc.innerHTML=`<h2 class="pt">Bonjour ${pnom} &#128075;</h2>
    <div class="cd">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <span class="bk bct">${CP.categorie}</span>
        ${last?`<span class="bk ${last.score>=35?'bok':'bko'}">${last.score}/40 dernière série</span>`:''}
      </div>
      <div style="font-size:12px;color:var(--mu);margin-bottom:4px">Progression (${jours}/${obj.min} jours min · ${obj.max} max)</div>
      <div class="pb"><div class="pf" style="width:${pct}%"></div></div>
    </div>
    <div class="sg g2" style="margin-bottom:1rem">
      <div class="sc2"><div class="sv">${(sr||[]).length}</div><div class="sl">séries</div></div>
      <div class="sc2"><div class="sv">${jours}</div><div class="sl">jours</div></div>
      <div class="sc2"><div class="sv">${moy}</div><div class="sl">moy./40</div></div>
      <div class="sc2"><div class="sv">${taux}%</div><div class="sl">réussite</div></div>
    </div>
    <button class="btn ba" onclick="stag('g',document.querySelectorAll('#stb .ti')[1])">&#9998; Nouvelle série</button>`;
}

function rGM(){
  document.getElementById('mc').innerHTML=`
    <div class="cd">
      <div class="cdt">&#128203; Nouvelle série</div>
      <div class="fi"><label>Date</label><input type="date" id="gd" value="${new Date().toISOString().split('T')[0]}"></div>
      <button class="btn bp" onclick="startG()">Commencer la grille</button>
    </div>
    <div style="font-size:12px;color:var(--mu);line-height:1.7;padding:.5rem 0">
      <b>Comment ça marche :</b><br>
      1 → Répondez aux 40 questions sur votre série papier<br>
      2 → Reportez vos réponses + votre certitude ici<br>
      3 → Saisissez les bonnes réponses pour voir votre analyse
    </div>`;
}

function startG(){
  const date=document.getElementById('gd').value;
  GD={date,reps:Array(40).fill(null).map(()=>({r:null,c:null})),bon:Array(40).fill(null),te:Array(40).fill(null)};
  rP1();
}

function rP1(){
  const n=GD.reps.filter(r=>r.r&&r.c).length;
  document.getElementById('mc').innerHTML=`
    <span class="ph">Phase 1 — Vos réponses (${n}/40)</span>
    <p style="font-size:12px;color:var(--mu);margin-bottom:10px">Reportez vos réponses A/B/C/D et votre certitude.</p>
    <div class="cd" style="padding:.5rem .75rem">
      <div style="display:grid;grid-template-columns:26px 1fr 1fr;gap:6px;font-size:11px;color:var(--mu);font-weight:600;padding:4px 0;text-align:center"><span></span><span>Réponse</span><span>Certitude</span></div>
      <div id="ql"></div>
    </div>
    <div class="rw mt">
      <button class="btn bg bs" onclick="rGM()">Annuler</button>
      <button class="btn bp bs" onclick="goP2()" style="flex:1;margin-left:8px">Correction →</button>
    </div>`;
  rQL();
}

function rQL(){
  const l=document.getElementById('ql');if(!l)return;
  l.innerHTML=GD.reps.map((r,i)=>`
    <div class="qr">
      <div class="qn">${i+1}</div>
      <div class="sg2">
        ${['A','B','C','D'].map(x=>`<button class="${r.r===x?'sl2':''}" onclick="sR(${i},'${x}')">${x}</button>`).join('')}
      </div>
      <div class="sg2">
        <button class="${r.c==='sure'?'sl2':''}" onclick="sC(${i},'sure')">✓</button>
        <button class="${r.c==='doubt'?'sl2':''}" onclick="sC(${i},'doubt')">?</button>
        <button class="${r.c==='guess'?'sl2':''}" onclick="sC(${i},'guess')">✗</button>
      </div>
    </div>`).join('');
}

function sR(i,v){GD.reps[i].r=v;rQL();upPh();}
function sC(i,v){GD.reps[i].c=v;rQL();upPh();}
function upPh(){const el=document.querySelector('.ph');if(el){const n=GD.reps.filter(r=>r.r&&r.c).length;el.textContent='Phase 1 — Vos réponses ('+n+'/40)';}}

function goP2(){
  const miss=GD.reps.filter(r=>!r.r||!r.c).length;
  if(miss>0&&!confirm(miss+' question(s) incomplète(s). Continuer quand même ?'))return;
  rP2();
}

function rP2(){
  document.getElementById('mc').innerHTML=`
    <span class="ph">Phase 2 — Correction</span>
    <p style="font-size:12px;color:var(--mu);margin-bottom:10px">Saisissez la bonne réponse. Pour chaque erreur, indiquez le type.</p>
    <div class="cd" style="padding:.5rem .75rem">
      <div style="display:grid;grid-template-columns:26px 1fr 1fr 1fr;gap:6px;font-size:11px;color:var(--mu);font-weight:600;padding:4px 0;text-align:center"><span></span><span>Bonne rép.</span><span>Résultat</span><span>Type</span></div>
      <div id="cl"></div>
    </div>
    <div class="rw mt">
      <button class="btn bg bs" onclick="rP1()">← Retour</button>
      <button class="btn bp bs" onclick="saveG()" style="flex:1;margin-left:8px">Enregistrer ✓</button>
    </div>`;
  rCL();
}

function rCL(){
  const l=document.getElementById('cl');if(!l)return;
  l.innerHTML=GD.reps.map((r,i)=>{
    const b=GD.bon[i],ok=b&&r.r===b,ko=b&&r.r!==b,te=GD.te[i];
    return`<div class="cr">
      <div class="qn">${i+1}</div>
      <div class="sg2">${['A','B','C','D'].map(x=>`<button class="${b===x?'sl2':''}" onclick="sB(${i},'${x}');rCL()">${x}</button>`).join('')}</div>
      <div style="text-align:center">
        ${!b?'<span style="color:var(--mu)">—</span>':ok?`<div class="rb rok">${r.r}</div>`:`<div style="display:flex;flex-direction:column;align-items:center;gap:1px"><div class="rb rko">✗</div><div style="font-size:10px;color:var(--mu)">${r.r||'?'}→<b style="color:var(--ok)">${b}</b></div></div>`}
      </div>
      <div>${ko?`<div class="es"><button class="${te===1?'s1':''}" onclick="sTE(${i},1);rCL()" title="Connaissance">??</button><button class="${te===2?'s2':''}" onclick="sTE(${i},2);rCL()" title="Compréhension">??</button><button class="${te===3?'s3':''}" onclick="sTE(${i},3);rCL()" title="Concentration">⏱</button></div>`:'<div style="text-align:center;color:var(--mu);font-size:11px">—</div>'}</div>
    </div>`;
  }).join('');
}

function sB(i,v){GD.bon[i]=v;}
function sTE(i,v){GD.te[i]=v;}

async function saveG(){
  const qs=GD.reps.map((r,i)=>({num:i+1,rep:r.r,cert:r.c,bonne:GD.bon[i],correct:!!(GD.bon[i]&&r.r===GD.bon[i]),typeErreur:GD.te[i]}));
  const score=qs.filter(q=>q.correct&&q.bonne).length;
  const ex=await api('series?stagiaire_id=eq.'+CP.id+'&date=eq.'+GD.date+'&select=id');
  const ns=(ex||[]).length+1;
  const sv=await api('series',{m:'POST',b:{stagiaire_id:CP.id,date:GD.date,num_serie:ns,score,questions:qs}});
  rAna(Array.isArray(sv)?sv[0]:sv);
}

function getA(qs){
  let bl=0,co=0,so=0,vi=0,ne=0;
  (qs||[]).forEach(q=>{
    if(q.cert==='sure'&&q.correct)so++;
    else if(q.cert==='sure'&&!q.correct)bl++;
    else if(q.cert==='doubt'&&q.correct)co++;
    else if(q.cert==='doubt'&&!q.correct)ne++;
    else vi++;
  });
  return{bl,co,so,vi,ne};
}

function rAna(s){
  const mc=document.getElementById('mc');
  const a=getA(s.questions);
  const ok=s.score>=35;
  const ne=(s.questions||[]).filter(q=>q.bonne&&!q.correct).length;
  const e1=(s.questions||[]).filter(q=>q.typeErreur===1).length;
  const e2=(s.questions||[]).filter(q=>q.typeErreur===2).length;
  const e3=(s.questions||[]).filter(q=>q.typeErreur===3).length;
  const bls=(s.questions||[]).filter(q=>q.bonne&&q.cert==='sure'&&!q.correct);
  mc.innerHTML=`
    <span class="ph" style="background:${ok?'var(--okb)':'var(--kob)'};color:${ok?'var(--ok)':'var(--ko)'}">${ok?'✓ Série réussie':'✗ Série échouée'}</span>
    <div class="cd" style="border-color:${ok?'var(--ok)':'var(--ko)'}">
      <div style="display:flex;align-items:center">
        <div style="flex:1"><div style="font-size:28px;font-weight:700;color:var(--b)">${s.score}/40</div><div style="font-size:12px;color:var(--mu)">${s.date}</div></div>
        <span class="bk ${ok?'bok':'bko'}" style="font-size:13px;padding:6px 14px">${ok?'≥ 35/40':'< 35/40'}</span>
      </div>
    </div>
    <div class="sg g2" style="margin-bottom:.75rem">
      <div class="sc2" style="background:var(--kob)"><div class="sv" style="color:var(--ko)">${a.bl}</div><div class="sl">?? Bloquant</div><div style="font-size:10px;color:var(--mu)">Sûr + Faux</div></div>
      <div class="sc2" style="background:var(--wab)"><div class="sv" style="color:var(--wa)">${a.co}</div><div class="sl">⚠️ À consolider</div><div style="font-size:10px;color:var(--mu)">Doute + Bon</div></div>
      <div class="sc2" style="background:var(--okb)"><div class="sv" style="color:var(--ok)">${a.so}</div><div class="sl">⚡ Potent. solide</div><div style="font-size:10px;color:var(--mu)">Sûr + Bon</div></div>
      <div class="sc2"><div class="sv">${a.vi+a.ne}</div><div class="sl">?? Terrain vierge</div></div>
    </div>
    ${ne>0?`<div class="cd"><div class="cdt">Types d'erreurs (${ne})</div>${e1?`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:13px">?? <span style="flex:1">Manque de connaissance</span><b>${e1}</b></div>`:''}${e2?`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:13px">?? <span style="flex:1">Manque de compréhension</span><b>${e2}</b></div>`:''}${e3?`<div style="display:flex;align-items:center;gap:8px;font-size:13px">⏱ <span style="flex:1">Manque de concentration</span><b>${e3}</b></div>`:''} </div>`:''}
    ${bls.length?`<div class="cd" style="border-color:var(--ko)"><div class="cdt" style="color:var(--ko)">?? Questions bloquantes (${bls.length})</div><p style="font-size:12px;color:var(--mu);margin-bottom:8px">Vous étiez sûr mais aviez tort — conviction fausse à corriger.</p>${bls.map(q=>`<div class="bli"><span style="font-weight:700;min-width:28px">Q${q.num}</span><span>Répondu <b>${q.rep}</b> → Bonne : <b style="color:var(--ok)">${q.bonne}</b></span></div>`).join('')}</div>`:''}
    <button class="btn bp mt" onclick="stag('a',document.querySelectorAll('#stb .ti')[0])">Retour à l'accueil</button>`;
}

async function rHisto(){
  const mc=document.getElementById('mc');
  mc.innerHTML='<div class="empty">Chargement...</div>';
  const sr=await api('series?stagiaire_id=eq.'+CP.id+'&order=created_at.desc&select=*');
  if(!sr||!sr.length){mc.innerHTML='<div class="empty">Aucune série enregistrée</div>';return;}
  window._S.histo=sr;
  mc.innerHTML=`<h2 class="pt">Mes séries</h2>
    <div class="cd" style="padding:.5rem .75rem">
      ${sr.map((s,i)=>{const a=getA(s.questions);return`<div class="hl" onclick="showSS(${i})">
        <div class="hli"><div class="hld">${s.date} · Série ${s.num_serie}</div>
        <div class="hlm">??${a.bl} ⚠${a.co} ⚡${a.so}</div></div>
        <span class="bk ${s.score>=35?'bok':'bko'}">${s.score}/40</span>
      </div>`;}).join('')}
    </div>`;
}
function showSS(i){rAna(window._S.histo[i]);}

// ── FORMATEUR ─────────────────────────────────────────────────
function form(t,el){
  document.querySelectorAll('#ftb .ti').forEach(x=>x.classList.remove('ac2'));
  if(el)el.classList.add('ac2');
  if(t==='s')rStags();
  else if(t==='k')rStatsA();
}

async function rStags(){
  const mc=document.getElementById('mc');
  mc.innerHTML='<div class="empty">Chargement...</div>';
  const[st,sr]=await Promise.all([
    api('profiles?role=eq.stagiaire&order=created_at.desc&select=*'),
    api('series?select=*&order=created_at.desc')
  ]);
  window._S.stags=st||[];
  window._S.allsr=sr||[];
  if(!st||!st.length){mc.innerHTML='<div class="empty">Aucun stagiaire inscrit</div>';return;}
  const tsr=(sr||[]).length;
  const taux=tsr?Math.round((sr||[]).filter(s=>s.score>=35).length/tsr*100):0;
  mc.innerHTML=`<h2 class="pt">Stagiaires (${st.length})</h2>
    <div class="sg g3" style="margin-bottom:1rem">
      <div class="sc2"><div class="sv">${st.length}</div><div class="sl">stagiaires</div></div>
      <div class="sc2"><div class="sv">${tsr}</div><div class="sl">séries</div></div>
      <div class="sc2"><div class="sv">${taux}%</div><div class="sl">réussite</div></div>
    </div>
    ${st.map((s,i)=>{
      const ss=(sr||[]).filter(x=>x.stagiaire_id===s.id);
      const last=ss[0];
      const moy=ss.length?(ss.reduce((a,x)=>a+x.score,0)/ss.length).toFixed(1):'—';
      return`<div class="cd" style="cursor:pointer" onclick="showStag(${i})">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="flex:1">
            <div style="font-weight:600;font-size:14px">${s.nom}</div>
            <div style="display:flex;gap:6px;margin-top:4px">
              <span class="bk bct">${s.categorie||'B'}</span>
              <span style="font-size:11px;color:var(--mu)">${ss.length} séries · moy ${moy}</span>
            </div>
          </div>
          ${last?`<span class="bk ${last.score>=35?'bok':'bko'}">${last.score}/40</span>`:''}
        </div>
      </div>`;
    }).join('')}`;
}

function showStag(i){
  const stag=window._S.stags[i];
  const sr=window._S.allsr||[];
  const series=sr.filter(s=>s.stagiaire_id===stag.id);
  window._S.curSeries=series;
  const obj=stag.categorie==='B'?{min:10,max:20}:{min:8,max:10};
  const jours=[...new Set(series.map(s=>s.date))].length;
  const pct=Math.min(100,Math.round(jours/obj.min*100));
  const moy=series.length?(series.reduce((a,s)=>a+s.score,0)/series.length).toFixed(1):'—';
  document.getElementById('mc').innerHTML=`
    <button class="btn bg bs" onclick="form('s',document.querySelectorAll('#ftb .ti')[0])" style="margin-bottom:12px">← Retour</button>
    <h2 class="pt">${stag.nom}</h2>
    <span class="bk bct">${stag.categorie||'B'}</span>
    <p style="font-size:12px;color:var(--mu);margin:4px 0 12px">${stag.email}</p>
    <div class="cd">
      <div style="font-size:12px;color:var(--mu);margin-bottom:4px">Progression (${jours}/${obj.min} jours min · ${obj.max} max)</div>
      <div class="pb"><div class="pf" style="width:${pct}%"></div></div>
    </div>
    <div class="sg g2" style="margin-bottom:1rem">
      <div class="sc2"><div class="sv">${series.length}</div><div class="sl">séries</div></div>
      <div class="sc2"><div class="sv">${moy}</div><div class="sl">score moyen</div></div>
      <div class="sc2"><div class="sv">${series.filter(s=>s.score>=35).length}</div><div class="sl">réussies</div></div>
      <div class="sc2"><div class="sv">${Math.round(series.filter(s=>s.score>=35).length/Math.max(1,series.length)*100)}%</div><div class="sl">taux réussite</div></div>
    </div>
    <h3 style="margin-bottom:.5rem">Historique</h3>
    <div class="cd" style="padding:.5rem .75rem">
      ${series.length?series.map((s,idx)=>{const a=getA(s.questions);return`<div class="hl" onclick="showCSerie(${idx})">
        <div class="hli"><div class="hld">${s.date} · Série ${s.num_serie}</div>
        <div class="hlm">??${a.bl} ⚠${a.co} ⚡${a.so}</div></div>
        <span class="bk ${s.score>=35?'bok':'bko'}">${s.score}/40</span>
      </div>`;
      }).join(''):'<div class="empty" style="padding:1rem">Aucune série</div>'}
    </div>`;
}
function showCSerie(i){rAna(window._S.curSeries[i]);}

async function rStatsA(){
  const mc=document.getElementById('mc');
  const today=new Date().toISOString().split('T')[0];
  const ms=today.substring(0,7)+'-01';
  mc.innerHTML=`<h2 class="pt">Statistiques</h2>
    <div class="cd">
      <div class="fb">
        <select id="fc"><option value="">Toutes catégories</option>${CATS.map(c=>`<option>${c}</option>`).join('')}</select>
        <input type="date" id="ff" value="${ms}">
        <input type="date" id="ft2" value="${today}">
      </div>
      <button class="btn bp bs" onclick="loadSt()" style="width:100%">Filtrer</button>
    </div>
    <div id="sr2"></div>`;
  loadSt();
}

async function loadSt(){
  const cat=document.getElementById('fc')?.value;
  const from=document.getElementById('ff')?.value;
  const to=document.getElementById('ft2')?.value;
  const el=document.getElementById('sr2');
  if(!el)return;
  el.innerHTML='<div class="empty">Chargement...</div>';
  let pq='profiles?role=eq.stagiaire&select=*';
  if(cat)pq+='&categorie=eq.'+encodeURIComponent(cat);
  const prs=await api(pq);
  const ids=(prs||[]).map(p=>p.id);
  if(!ids.length){el.innerHTML='<div class="empty">Aucun stagiaire trouvé</div>';return;}
  let sq='series?select=*&order=date.asc&stagiaire_id=in.('+ids.join(',')+')';
  if(from)sq+='&date=gte.'+from;
  if(to)sq+='&date=lte.'+to;
  const sr=await api(sq);
  if(!sr||!sr.length){el.innerHTML='<div class="empty">Aucune série sur cette période</div>';return;}
  const taux=Math.round(sr.filter(s=>s.score>=35).length/sr.length*100);
  const moy=(sr.reduce((a,s)=>a+s.score,0)/sr.length).toFixed(1);
  const byD={};
  sr.forEach(s=>{if(!byD[s.date])byD[s.date]=[];byD[s.date].push(s.score);});
  const labs=Object.keys(byD).sort();
  const movs=labs.map(d=>(byD[d].reduce((a,b)=>a+b,0)/byD[d].length).toFixed(1));
  const catS=CATS.map(c=>{
    const cs=sr.filter(s=>(prs||[]).find(p=>p.id===s.stagiaire_id&&p.categorie===c));
    if(!cs.length)return'';
    const cm=(cs.reduce((a,s)=>a+s.score,0)/cs.length).toFixed(1);
    const ct=Math.round(cs.filter(s=>s.score>=35).length/cs.length*100);
    return`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd)">
      <span class="bk bct" style="min-width:70px;text-align:center">${c}</span>
      <span style="flex:1;font-size:12px;color:var(--mu)">${cs.length} séries</span>
      <span style="font-size:13px;font-weight:600">${cm}/40</span>
      <span class="bk ${ct>=70?'bok':'bko'}">${ct}%</span>
    </div>`;
  }).join('');
  el.innerHTML=`
    <div class="sg g2" style="margin-bottom:1rem">
      <div class="sc2"><div class="sv">${(prs||[]).length}</div><div class="sl">stagiaires</div></div>
      <div class="sc2"><div class="sv">${sr.length}</div><div class="sl">séries</div></div>
      <div class="sc2"><div class="sv">${moy}</div><div class="sl">score moyen /40</div></div>
      <div class="sc2"><div class="sv">${taux}%</div><div class="sl">taux de réussite</div></div>
    </div>
    <div class="cd"><div class="cdt">Évolution du score moyen</div><div class="cw"><canvas id="cev"></canvas></div></div>
    ${cat?'':`<div class="cd"><div class="cdt">Par catégorie</div>${catS}</div>`}`;
  if(CHT)CHT.destroy();
  const ctx=document.getElementById('cev');
  if(ctx&&labs.length>=1){
    CHT=new Chart(ctx,{type:'line',data:{labels:labs,datasets:[{label:'Score moyen',data:movs,borderColor:'#1B3A6B',backgroundColor:'rgba(27,58,107,.1)',tension:0.3,fill:true,pointBackgroundColor:'#1B3A6B'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:40,ticks:{stepSize:10}},x:{ticks:{maxTicksLimit:6,maxRotation:0}}}}});
  }
}
</script>
</body>
</html>
